<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbitraj Raporu — Tane Tekno</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .header .badge { background: #0ea5e9; color: #fff; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 99px; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; text-align: center; }
    .stat-card .val { font-size: 28px; font-weight: 700; color: #38bdf8; }
    .stat-card .lbl { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .controls { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 9px 18px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-green   { background: #22c55e; color: #fff; }
    .search { padding: 9px 14px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 14px; min-width: 220px; }
    .search:focus { outline: 2px solid #0ea5e9; }
    .run-info { font-size: 13px; color: #64748b; margin-left: auto; }
    .status-bar { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; display: none; }
    .status-bar.active { display: block; border-color: #0ea5e9; }
    .status-bar .status-title { font-size: 13px; font-weight: 700; color: #38bdf8; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .status-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 1s infinite; }
    .status-bar .dot.idle { background: #64748b; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .log-box { background: #0f172a; border-radius: 6px; padding: 10px 14px; max-height: 180px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #94a3b8; line-height: 1.6; }
    .log-box .match { color: #4ade80; }
    .log-box .err   { color: #f87171; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; border: 1px solid #334155; }
    thead { background: #0f172a; }
    th { padding: 12px 14px; font-size: 12px; font-weight: 600; text-align: left; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
    td { padding: 12px 14px; font-size: 13px; border-top: 1px solid #1e293b; vertical-align: middle; }
    tr:hover td { background: #172033; }
    .gap-badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 12px; font-weight: 700; }
    .gap-hot  { background: #dc2626; color: #fff; }
    .gap-good { background: #16a34a; color: #fff; }
    .gap-ok   { background: #ca8a04; color: #fff; }
    .seller-tag { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: 600; }
    .seller-amazon { background: #FF9900; color: #111; }
    .seller-prime  { background: #232f3e; color: #48cae4; border: 1px solid #48cae4; }
    .seller-media  { background: #e3000b; color: #fff; }
    .seller-other  { background: #334155; color: #cbd5e1; }
    a.product-link { color: #38bdf8; text-decoration: none; font-weight: 500; }
    a.product-link:hover { text-decoration: underline; }
    .price { font-weight: 700; color: #f1f5f9; white-space: nowrap; }
    .price-buy  { color: #4ade80; }
    .price-sell { color: #fb923c; }
    .profit { color: #a78bfa; font-weight: 700; }
    .empty { text-align: center; padding: 60px; color: #475569; }
    .loading { text-align: center; padding: 60px; color: #64748b; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #334155; border-top-color: #0ea5e9; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #22c55e; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <h1>Arbitraj Raporu</h1>
  <span class="badge" id="result-count">—</span>
</div>

<div class="container">
  <div class="status-bar" id="status-bar">
    <div class="status-title">
      <div class="dot" id="status-dot"></div>
      <span id="status-title-text">Tarama çalışıyor…</span>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>

  <div class="stats" id="stats-row"></div>

  <div class="controls">
    <button class="btn btn-primary" onclick="loadData()">Yenile</button>
    <button class="btn btn-green"   onclick="triggerSync()">Taramayı Başlat</button>
    <input  class="search" id="search" placeholder="Ürün ara…" oninput="filterTable()">
    <span   class="run-info" id="run-info"></span>
  </div>

  <div id="table-wrap">
    <div class="loading"><div class="spinner"></div><br>Yükleniyor…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allRows = [];

function sellerTag(name) {
  if (!name) return '<span class="seller-tag seller-other">—</span>';
  const n = name.toLowerCase();
  if (n.includes('amazon prime')) return `<span class="seller-tag seller-prime">${name}</span>`;
  if (n.includes('amazon'))       return `<span class="seller-tag seller-amazon">${name}</span>`;
  if (n.includes('mediamarkt') || n.includes('media markt')) return `<span class="seller-tag seller-media">${name}</span>`;
  return `<span class="seller-tag seller-other">${name}</span>`;
}

function gapBadge(pct) {
  const cls = pct >= 20 ? 'gap-hot' : pct >= 10 ? 'gap-good' : 'gap-ok';
  return `<span class="gap-badge ${cls}">%${pct.toFixed(1)}</span>`;
}

function fmt(n) {
  return Number(n).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">Sonuç bulunamadı.</div>';
    return;
  }
  const tbody = rows.map(r => `
    <tr>
      <td><a class="product-link" href="${r.product_url}" target="_blank">${r.product_name || '—'}</a></td>
      <td>${sellerTag(r.cheapest_seller)}</td>
      <td class="price price-buy">${fmt(r.cheapest_price)} ₺</td>
      <td>${sellerTag(r.second_seller)}</td>
      <td class="price price-sell">${fmt(r.second_price)} ₺</td>
      <td class="profit">${fmt(r.gap_tl)} ₺</td>
      <td>${gapBadge(r.gap_pct)}</td>
      <td><a class="product-link" href="${r.cheapest_offer_url}" target="_blank">Al →</a></td>
    </tr>`).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Ürün</th>
          <th>En Ucuz Satıcı</th>
          <th>Alış Fiyatı</th>
          <th>2. Ucuz Satıcı</th>
          <th>Satış Fiyatı</th>
          <th>Kâr (₺)</th>
          <th>Fark %</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody>${tbody}</tbody>
    </table>`;
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  renderTable(q ? allRows.filter(r => (r.product_name || '').toLowerCase().includes(q)) : allRows);
}

async function loadData() {
  document.getElementById('table-wrap').innerHTML = '<div class="loading"><div class="spinner"></div><br>Yükleniyor…</div>';
  try {
    const [items, runs] = await Promise.all([
      fetch('/api/arbitrage/latest?limit=200').then(r => r.json()),
      fetch('/api/arbitrage/runs').then(r => r.json()),
    ]);

    allRows = Array.isArray(items) ? items : [];
    document.getElementById('result-count').textContent = allRows.length + ' fırsat';

    // Stats
    const totalProfit = allRows.reduce((s, r) => s + (r.gap_tl || 0), 0);
    const avgGap      = allRows.length ? allRows.reduce((s, r) => s + (r.gap_pct || 0), 0) / allRows.length : 0;
    const hotCount    = allRows.filter(r => r.gap_pct >= 20).length;
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="val">${allRows.length}</div><div class="lbl">Toplam Fırsat</div></div>
      <div class="stat-card"><div class="val">${hotCount}</div><div class="lbl">Sıcak (&gt;%20)</div></div>
      <div class="stat-card"><div class="val">%${avgGap.toFixed(1)}</div><div class="lbl">Ort. Fark</div></div>
      <div class="stat-card"><div class="val">${fmt(totalProfit)} ₺</div><div class="lbl">Toplam Potansiyel Kâr</div></div>
      <div class="stat-card"><div class="val">${runs.length}</div><div class="lbl">Toplam Tarama</div></div>`;

    // Run info
    if (runs[0]) {
      const d = new Date(runs[0].created_at);
      document.getElementById('run-info').textContent =
        `Son tarama: ${d.toLocaleDateString('tr-TR')} ${d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })}`;
    }

    renderTable(allRows);
  } catch (e) {
    document.getElementById('table-wrap').innerHTML = `<div class="empty">Hata: ${e.message}</div>`;
  }
}

async function triggerSync() {
  const res = await fetch('/api/admin/run-arbitrage', { method: 'POST' }).then(r => r.json()).catch(() => ({}));
  if (res.running) { showToast('Tarama zaten çalışıyor!'); return; }
  showToast('Tarama başlatıldı…');
  startStatusPolling();
}

// ── Status polling ─────────────────────────────────────────────────────────
let statusInterval = null;
let lastLogLen = 0;
let wasRunning = false;

function startStatusPolling() {
  if (statusInterval) return;
  statusInterval = setInterval(pollStatus, 3000);
  pollStatus();
}

async function pollStatus() {
  try {
    const s = await fetch('/api/admin/arbitrage-status').then(r => r.json());
    const bar  = document.getElementById('status-bar');
    const dot  = document.getElementById('status-dot');
    const title = document.getElementById('status-title-text');
    const logBox = document.getElementById('log-box');

    if (s.running || (s.log && s.log.length > 0)) {
      bar.classList.add('active');
      dot.className = s.running ? 'dot' : 'dot idle';
      title.textContent = s.running ? 'Tarama çalışıyor…' : 'Son tarama tamamlandı';

      // Only append new lines
      const newLines = s.log.slice(lastLogLen);
      if (newLines.length) {
        lastLogLen = s.log.length;
        newLines.forEach(line => {
          const div = document.createElement('div');
          div.className = line.includes('✓') ? 'match' : line.includes('HATA') ? 'err' : '';
          div.textContent = line;
          logBox.appendChild(div);
        });
        logBox.scrollTop = logBox.scrollHeight;
      }
    }

    // When scan finishes, reload the results table
    if (wasRunning && !s.running) {
      setTimeout(loadData, 2000);
      showToast('Tarama tamamlandı! Sonuçlar güncellendi.');
      clearInterval(statusInterval);
      statusInterval = null;
      lastLogLen = 0;
    }
    wasRunning = s.running;
  } catch (_) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

loadData();
// Check if a scan is already running when page opens
pollStatus().then(() => { if (wasRunning) startStatusPolling(); });
</script>
</body>
</html>
