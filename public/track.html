<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tane Store — Sipariş Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#FDFAF6;--surface:#F5EFE4;--border-light:#EDE4D4;--border:#DDD0BC;
  --text:#1C1814;--text2:#6B5E50;--text3:#A89480;
  --accent:#C49660;--accent-h:#A67D48;
  --green:#1a7a3a;--green-bg:#f0faf4;--red:#c00;
  --blue:#0060c7;--blue-bg:#f0f5ff;--blue-border:#c8d8f8;
  --r:10px;--r-lg:16px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow:0 4px 20px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:rgba(253,250,246,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:100;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.logo{font-weight:700;font-size:18px;color:var(--text);text-decoration:none;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.back{color:var(--text2);font-size:13px;text-decoration:none;transition:color .15s}
.back:hover{color:var(--text)}

.main{max-width:620px;margin:48px auto;padding:0 24px}
.page-title{font-size:28px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px;color:var(--text)}
.page-sub{color:var(--text2);font-size:14px;margin-bottom:32px}

.search-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:24px;margin-bottom:24px}
.search-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:block}
.search-row{display:flex;gap:10px}
.search-input{flex:1;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:'Inter',sans-serif;font-size:15px;outline:none;color:var(--text);background:var(--bg);transition:border .2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent)}
.btn-search{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:var(--r);font-family:'Inter',sans-serif;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-search:hover{background:var(--accent-h)}

.result-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm);animation:fadeUp .3s ease}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

.order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.order-id{font-size:22px;font-weight:700;color:var(--accent)}
.order-date{font-size:13px;color:var(--text3);margin-top:2px}

.timeline{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;position:relative}
.timeline::before{content:'';position:absolute;top:18px;left:18px;right:18px;height:2px;background:var(--border-light);z-index:0}
.timeline-step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;position:relative;z-index:1}
.step-dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .3s;color:var(--text3)}
.step-dot.done{background:var(--accent);border-color:var(--accent);color:#fff}
.step-dot.current{background:var(--bg);border-color:var(--accent);box-shadow:0 0 0 4px rgba(232,93,0,.12);color:var(--accent)}
.step-label{font-size:11px;font-weight:500;text-align:center;color:var(--text3);line-height:1.3}
.step-label.done,.step-label.current{color:var(--text)}

.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.s-Beklemede{background:#FDF5EB;color:var(--accent);border:1px solid #fde0c0}
.s-Onaylandı{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.s-Kargoda{background:var(--green-bg);color:var(--green);border:1px solid #b6e8cc}
.s-Teslim{background:var(--green-bg);color:var(--green);border:1px solid #b6e8cc}
.s-İptal{background:#fff5f5;color:var(--red);border:1px solid #fcc}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;padding:16px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border-light)}
.info-item label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.info-item span{font-size:14px;font-weight:600;color:var(--text)}

.shipping-box{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:var(--r);padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.shipping-label{font-size:10px;color:var(--blue);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.shipping-carrier{font-weight:600;font-size:14px;color:var(--text);margin-bottom:2px}
.shipping-code{font-family:monospace;font-size:13px;color:var(--blue)}

.items-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.order-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:14px}
.order-item:last-child{border-bottom:none}
.item-name{font-weight:400;color:var(--text2);flex:1}
.item-qty{color:var(--text3);font-size:13px;margin:0 12px}
.item-price{font-weight:600;color:var(--text)}

.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:14px;margin-top:4px;border-top:1px solid var(--border)}
.total-label{font-size:14px;color:var(--text2)}
.total-amount{font-size:20px;font-weight:700;color:var(--accent)}
.discount-info{font-size:13px;color:var(--green);font-weight:500;margin-top:4px;text-align:right}

.btn-home{display:inline-flex;align-items:center;gap:8px;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:11px 20px;border-radius:var(--r);font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;text-decoration:none;margin-top:20px;transition:all .15s}
.btn-home:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

.error-card{background:#fff5f5;border:1px solid #fcc;border-radius:var(--r-lg);padding:32px;text-align:center}
.error-msg{font-size:14px;color:var(--red);font-weight:600;margin-bottom:6px}
.error-hint{font-size:13px;color:var(--text2)}
</style>
</head>
<body>
<nav class="nav">
  <a class="logo" href="/landing"><img src="/AmblemTane.png" alt="Tane Store" style="height:38px;display:block"></a>
  <a href="/" class="back">← Alışverişe Dön</a>
</nav>
<div class="main">
  <div class="page-title">Sipariş Takip</div>
  <p class="page-sub">Sipariş numaranızı girerek kargo durumunuzu öğrenin.</p>
  <div class="search-card">
    <span class="search-label">Sipariş numaranızı girin</span>
    <div class="search-row">
      <input class="search-input" id="order-id-input" type="number" placeholder="Sipariş numarası (ör: 42)" onkeydown="if(event.key==='Enter')trackOrder()"/>
      <button class="btn-search" onclick="trackOrder()">Sorgula</button>
    </div>
  </div>
  <div id="result"></div>
</div>
<script>
const STATUS_STEPS = ['Beklemede','Onaylandı','Kargoda','Teslim Edildi'];
const STATUS_ICONS = {
  'Beklemede': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  'Onaylandı': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  'Kargoda': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
  'Teslim Edildi': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  'İptal': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
};

async function trackOrder() {
  const id = document.getElementById('order-id-input').value.trim();
  if (!id) return;
  document.getElementById('result').innerHTML = '<div style="text-align:center;padding:40px;color:#aeaeb2;font-size:14px">Sorgulanıyor…</div>';
  try {
    const res = await fetch(`/api/orders/track/${id}`);
    const data = await res.json();
    if (data.error) {
      document.getElementById('result').innerHTML = `
        <div class="error-card">
          <div class="error-msg">${data.error}</div>
          <div class="error-hint">Sipariş numaranızı kontrol edip tekrar deneyin.</div>
        </div>`;
      return;
    }
    renderOrder(data);
  } catch(e) {
    document.getElementById('result').innerHTML = `<div class="error-card"><div class="error-msg">Bağlantı hatası. Tekrar deneyin.</div></div>`;
  }
}

function renderOrder(order) {
  const isCancelled = order.status === 'İptal';
  const currentStepIdx = isCancelled ? -1 : STATUS_STEPS.indexOf(order.status);

  const timelineHTML = STATUS_STEPS.map((step, i) => {
    let dotClass = '', labelClass = '';
    if (!isCancelled) {
      if (i < currentStepIdx) { dotClass = 'done'; labelClass = 'done'; }
      else if (i === currentStepIdx) { dotClass = 'current'; labelClass = 'current'; }
    }
    const icon = i <= currentStepIdx && !isCancelled ? STATUS_ICONS[step] || '' : '';
    return `<div class="timeline-step">
      <div class="step-dot ${dotClass}">${icon}</div>
      <div class="step-label ${labelClass}">${step}</div>
    </div>`;
  }).join('');

  const statusKey = isCancelled ? 'İptal' : (order.status === 'Teslim Edildi' ? 'Teslim' : order.status.split(' ')[0]);
  const items = order.items || [];

  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <div class="order-header">
        <div>
          <div class="order-id">#${order.id}</div>
          <div class="order-date">${new Date(order.created_at).toLocaleDateString('tr-TR', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <span class="status-badge s-${statusKey}">${order.status}</span>
      </div>

      ${!isCancelled ? `<div class="timeline">${timelineHTML}</div>` : ''}

      <div class="info-grid">
        <div class="info-item"><label>Müşteri</label><span>${order.customer_name}</span></div>
        <div class="info-item"><label>Şehir</label><span>${order.customer_city}</span></div>
        <div class="info-item"><label>Durum</label><span>${order.status}</span></div>
        <div class="info-item"><label>Toplam</label><span>${order.total_price.toLocaleString('tr-TR')} ₺</span></div>
      </div>

      ${order.shipping_code ? `
      <div class="shipping-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0060c7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <div>
          <div class="shipping-label">Kargo Bilgisi</div>
          <div class="shipping-carrier">${order.shipping_carrier || 'Kargo Firması'}</div>
          <div class="shipping-code">Takip No: ${order.shipping_code}</div>
        </div>
      </div>` : ''}

      <div class="items-title">Sipariş İçeriği</div>
      ${items.map(item => `
        <div class="order-item">
          <span class="item-name">${item.product_name}</span>
          <span class="item-qty">×${item.quantity}</span>
          <span class="item-price">${(item.price * item.quantity).toLocaleString('tr-TR')} ₺</span>
        </div>`).join('')}

      <div class="total-row">
        <span class="total-label">Toplam Tutar</span>
        <span class="total-amount">${order.total_price.toLocaleString('tr-TR')} ₺</span>
      </div>
      ${order.discount_amount > 0 ? `<div class="discount-info">${order.coupon_code} kuponu ile ${order.discount_amount.toLocaleString('tr-TR')} ₺ tasarruf ettiniz</div>` : ''}

      <a href="/" class="btn-home">← Alışverişe Devam Et</a>
    </div>`;
}

const urlParams = new URLSearchParams(window.location.search);
const autoId = urlParams.get('id');
if (autoId) { document.getElementById('order-id-input').value = autoId; trackOrder(); }
</script>
</body>
</html>
