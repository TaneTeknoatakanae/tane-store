<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tane Store — Sipariş Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#f5f5f7;min-height:100vh}
nav{background:#0f0f0f;border-bottom:1px solid #1c1c1e;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-weight:700;font-size:18px;color:#f5f5f7;text-decoration:none;letter-spacing:-0.5px}
.logo span{color:#e85d00}
.back{color:#98989d;font-size:13px;text-decoration:none;transition:color .15s}
.back:hover{color:#f5f5f7}
.main{max-width:620px;margin:48px auto;padding:0 24px}
.page-title{font-size:28px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.page-sub{color:#98989d;font-size:14px;margin-bottom:32px}

.search-box{background:#141414;border:1px solid #2a2a2a;border-radius:14px;padding:24px;margin-bottom:24px}
.search-box h3{font-size:15px;font-weight:600;margin-bottom:16px;color:#f5f5f7}
.search-row{display:flex;gap:10px}
.search-input{flex:1;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;font-family:'Inter',sans-serif;font-size:15px;outline:none;color:#f5f5f7;background:#1c1c1e;transition:border .2s}
.search-input::placeholder{color:#48484a}
.search-input:focus{border-color:#3a3a3a}
.btn-search{background:#e85d00;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-search:hover{background:#ff6a00}

.result-card{background:#141414;border:1px solid #2a2a2a;border-radius:14px;padding:28px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

.order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.order-id{font-size:22px;font-weight:700;color:#e85d00}
.order-date{font-size:13px;color:#48484a;margin-top:2px}

.timeline{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;position:relative}
.timeline::before{content:'';position:absolute;top:18px;left:18px;right:18px;height:1px;background:#2a2a2a;z-index:0}
.timeline-step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;position:relative;z-index:1}
.step-dot{width:36px;height:36px;border-radius:50%;border:1px solid #2a2a2a;background:#141414;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .3s;color:#48484a}
.step-dot.done{background:#e85d00;border-color:#e85d00;color:#fff}
.step-dot.current{background:#141414;border-color:#e85d00;box-shadow:0 0 0 4px rgba(232,93,0,.15);color:#e85d00}
.step-label{font-size:11px;font-weight:500;text-align:center;color:#48484a;line-height:1.3}
.step-label.done,.step-label.current{color:#f5f5f7}

.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.status-Beklemede{background:#2a1800;color:#e85d00;border:1px solid #3a2000}
.status-Onaylandı{background:#001a2a;color:#0a84ff;border:1px solid #002a3a}
.status-Kargoda{background:#001a0a;color:#30d158;border:1px solid #002a10}
.status-Teslim{background:#001a0a;color:#30d158;border:1px solid #002a10}
.status-İptal{background:#2a0a0a;color:#ff453a;border:1px solid #3a1010}

.order-info{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;padding:16px;background:#1c1c1e;border-radius:10px;border:1px solid #2a2a2a}
.info-item label{font-size:10px;color:#48484a;font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.info-item span{font-size:14px;font-weight:600;color:#f5f5f7}

.shipping-box{background:#001a2a;border:1px solid #002a3a;border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.shipping-label{font-size:10px;color:#0a84ff;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.shipping-carrier{font-weight:600;font-size:14px;color:#f5f5f7;margin-bottom:2px}
.shipping-code{font-family:monospace;font-size:13px;color:#0a84ff}

.items-title{font-size:14px;font-weight:600;margin-bottom:12px;color:#f5f5f7}
.order-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1c1c1e;font-size:14px}
.order-item:last-child{border-bottom:none}
.item-name{font-weight:400;color:#98989d;flex:1}
.item-qty{color:#48484a;font-size:13px;margin:0 12px}
.item-price{font-weight:600;color:#f5f5f7}

.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:14px;margin-top:4px;border-top:1px solid #2a2a2a}
.total-label{font-size:14px;color:#98989d}
.total-amount{font-size:20px;font-weight:700;color:#e85d00}
.discount-info{font-size:13px;color:#30d158;font-weight:500;margin-top:4px;text-align:right}

.btn-home{display:inline-flex;align-items:center;gap:8px;background:#2a2a2a;color:#f5f5f7;border:none;padding:11px 20px;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;text-decoration:none;margin-top:20px;transition:background .15s}
.btn-home:hover{background:#e85d00;color:#fff}

.error-card{background:#141414;border:1px solid #2a0a0a;border-radius:14px;padding:32px;text-align:center}
.error-msg{font-size:14px;color:#ff453a;font-weight:500;margin-bottom:8px}
.error-hint{font-size:13px;color:#48484a}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">TANE <span>STORE</span></a>
  <a href="/" class="back">← Alışverişe Dön</a>
</nav>
<div class="main">
  <div class="page-title">Sipariş Takip</div>
  <p class="page-sub">Sipariş numaranızı girerek kargo durumunuzu öğrenin.</p>
  <div class="search-box">
    <h3>Sipariş numaranızı girin</h3>
    <div class="search-row">
      <input class="search-input" id="order-id-input" type="number" placeholder="Sipariş numarası (ör: 42)" onkeydown="if(event.key==='Enter')trackOrder()"/>
      <button class="btn-search" onclick="trackOrder()">Sorgula</button>
    </div>
  </div>
  <div id="result"></div>
</div>
<script>
const STATUS_STEPS = ['Beklemede','Onaylandı','Kargoda','Teslim Edildi'];
const STATUS_ICONS = {
  'Beklemede': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  'Onaylandı': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  'Kargoda': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
  'Teslim Edildi': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  'İptal': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
};

async function trackOrder() {
  const id = document.getElementById('order-id-input').value.trim();
  if (!id) return;
  document.getElementById('result').innerHTML = '<div style="text-align:center;padding:40px;color:#48484a;font-size:14px">Sorgulanıyor...</div>';
  try {
    const res = await fetch(`/api/orders/track/${id}`);
    const data = await res.json();
    if (data.error) {
      document.getElementById('result').innerHTML = `
        <div class="error-card">
          <div class="error-msg">${data.error}</div>
          <div class="error-hint">Sipariş numaranızı kontrol edip tekrar deneyin.</div>
        </div>`;
      return;
    }
    renderOrder(data);
  } catch(e) {
    document.getElementById('result').innerHTML = `<div class="error-card"><div class="error-msg">Bağlantı hatası. Tekrar deneyin.</div></div>`;
  }
}

function renderOrder(order) {
  const isCancelled = order.status === 'İptal';
  const currentStepIdx = isCancelled ? -1 : STATUS_STEPS.indexOf(order.status);

  const timelineHTML = STATUS_STEPS.map((step, i) => {
    let dotClass = '', labelClass = '';
    if (!isCancelled) {
      if (i < currentStepIdx) { dotClass = 'done'; labelClass = 'done'; }
      else if (i === currentStepIdx) { dotClass = 'current'; labelClass = 'current'; }
    }
    const icon = i <= currentStepIdx && !isCancelled ? STATUS_ICONS[step] || '' : '';
    return `<div class="timeline-step">
      <div class="step-dot ${dotClass}">${icon}</div>
      <div class="step-label ${labelClass}">${step}</div>
    </div>`;
  }).join('');

  const statusKey = isCancelled ? 'İptal' : order.status.split(' ')[0];
  const statusClass = 'status-' + (order.status === 'Teslim Edildi' ? 'Teslim' : statusKey);
  const items = order.items || [];

  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <div class="order-header">
        <div>
          <div class="order-id">#${order.id}</div>
          <div class="order-date">${new Date(order.created_at).toLocaleDateString('tr-TR', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <span class="status-badge ${statusClass}">${order.status}</span>
      </div>

      ${!isCancelled ? `<div class="timeline">${timelineHTML}</div>` : ''}

      <div class="order-info">
        <div class="info-item"><label>Müşteri</label><span>${order.customer_name}</span></div>
        <div class="info-item"><label>Şehir</label><span>${order.customer_city}</span></div>
        <div class="info-item"><label>Durum</label><span>${order.status}</span></div>
        <div class="info-item"><label>Toplam</label><span>${order.total_price.toLocaleString('tr-TR')} ₺</span></div>
      </div>

      ${order.shipping_code ? `
      <div class="shipping-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <div>
          <div class="shipping-label">Kargo Bilgisi</div>
          <div class="shipping-carrier">${order.shipping_carrier || 'Kargo Firması'}</div>
          <div class="shipping-code">Takip No: ${order.shipping_code}</div>
        </div>
      </div>` : ''}

      <div class="items-title">Sipariş İçeriği</div>
      ${items.map(item => `
        <div class="order-item">
          <span class="item-name">${item.product_name}</span>
          <span class="item-qty">×${item.quantity}</span>
          <span class="item-price">${(item.price * item.quantity).toLocaleString('tr-TR')} ₺</span>
        </div>`).join('')}

      <div class="total-row">
        <span class="total-label">Toplam Tutar</span>
        <span class="total-amount">${order.total_price.toLocaleString('tr-TR')} ₺</span>
      </div>
      ${order.discount_amount > 0 ? `<div class="discount-info">${order.coupon_code} kuponu ile ${order.discount_amount.toLocaleString('tr-TR')} ₺ tasarruf ettiniz</div>` : ''}

      <a href="/" class="btn-home">← Alışverişe Devam Et</a>
    </div>`;
}

const urlParams = new URLSearchParams(window.location.search);
const autoId = urlParams.get('id');
if (autoId) { document.getElementById('order-id-input').value = autoId; trackOrder(); }
</script>
</body>
</html>
