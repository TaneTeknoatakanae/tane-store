<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<script async src="/ga.js"></script>
<link rel="icon" href="/AmblemTane.png" type="image/png">
<link rel="apple-touch-icon" href="/AmblemTane.png">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tane Store — Giriş Yap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#FDFAF6;--surface:#F5EFE4;--border-light:#EDE4D4;--border:#DDD0BC;--text:#1C1814;--text2:#6B5E50;--text3:#A89480;--accent:#C49660;--accent-h:#A67D48;--r:10px;--r-lg:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{background:rgba(253,250,246,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-light);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-weight:700;font-size:18px;color:var(--text);text-decoration:none;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.back{color:var(--text2);font-size:13px;text-decoration:none;transition:color .15s}
.back:hover{color:var(--text)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.card-title{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px;color:var(--text)}
.card-sub{color:var(--text2);font-size:14px;margin-bottom:28px}
.field{margin-bottom:16px}
label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border .2s;color:var(--text);background:var(--bg)}
input::placeholder{color:var(--text3)}
input:focus{border-color:var(--accent)}
.btn{width:100%;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:var(--r);font-family:'Inter',sans-serif;font-weight:600;font-size:15px;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:var(--accent-h)}
.btn:disabled{background:var(--border);color:var(--text3);cursor:default}
.err{background:#fff5f5;border:1px solid #fcc;color:#c00;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.link-row{text-align:center;margin-top:20px;font-size:13px;color:var(--text3)}
.link-row a{color:var(--accent);font-weight:500;text-decoration:none}
.link-row a:hover{color:var(--accent-h)}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/landing"><img src="/AmblemTane.png" alt="Tane Store" style="height:38px;display:block;mix-blend-mode:multiply"></a>
  <a href="/" class="back">← Alışverişe Dön</a>
</nav>
<div class="main">
  <div class="card">
    <div class="card-title">Giriş Yap</div>
    <div class="card-sub">Hesabınıza devam edin</div>
    <div class="err" id="err"></div>
    <div class="field">
      <label>E-posta</label>
      <input type="email" id="email" placeholder="ornek@mail.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Şifre</label>
      <input type="password" id="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn" id="btn" onclick="login()">Giriş Yap</button>
    <div class="link-row">
      Hesabınız yok mu? <a href="/register">Üye Ol</a>
    </div>
  </div>
</div>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('err');
  const btn = document.getElementById('btn');
  errEl.style.display = 'none';
  if (!email || !password) { showErr('E-posta ve şifre gerekli'); return; }
  btn.disabled = true; btn.textContent = 'Giriş yapılıyor…';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      credentials: 'include', body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error); btn.disabled = false; btn.textContent = 'Giriş Yap'; return; }
    await syncGuestData();
    const next = new URLSearchParams(window.location.search).get('next') || '/';
    window.location.href = next;
  } catch(e) { showErr('Bağlantı hatası'); btn.disabled = false; btn.textContent = 'Giriş Yap'; }
}
async function syncGuestData() {
  const cart = JSON.parse(localStorage.getItem('tane-cart') || '[]');
  if (cart.length) {
    const items = cart.map(i => ({ product_id: i.id, quantity: i.quantity || 1 }));
    await fetch('/api/cart/sync', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ items }) });
    localStorage.removeItem('tane-cart');
  }
  const wish = JSON.parse(localStorage.getItem('tane-wishlist') || '[]');
  if (wish.length) {
    await fetch('/api/wishlist/sync', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ ids: wish }) });
    localStorage.removeItem('tane-wishlist');
  }
}
function showErr(msg) { const el = document.getElementById('err'); el.textContent = msg; el.style.display = 'block'; }
</script>
</body>
</html>
