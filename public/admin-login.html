<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Girişi — Tane Store</title>
<link rel="icon" href="/AmblemTane.png" type="image/png">
<link rel="apple-touch-icon" href="/AmblemTane.png">
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:40px;width:100%;max-width:380px}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-wrap img{height:44px;mix-blend-mode:screen;opacity:.9}
h1{font-size:18px;font-weight:700;color:#f5f5f5;text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:#666;text-align:center;margin-bottom:28px}
label{display:block;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
input{width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:12px 14px;font-size:15px;color:#f5f5f5;outline:none;transition:border .2s;margin-bottom:16px}
input:focus{border-color:#C49660}
input::placeholder{color:#444}
.totp-wrap{display:none}
.totp-wrap.show{display:block}
.btn{width:100%;background:#C49660;border:none;color:#fff;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px}
.btn:hover{background:#A67D48}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{background:#2a0000;border:1px solid #5a0000;color:#f87171;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:16px;display:none}
.error.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/AmblemTane.png" alt="Tane Store">
  </div>
  <h1>Yönetim Paneli</h1>
  <p class="sub">Devam etmek için giriş yapın</p>

  <form id="form" onsubmit="login(event)">
    <label for="username">Kullanıcı Adı</label>
    <input id="username" type="text" placeholder="admin" autocomplete="username" required autofocus/>

    <label for="password">Şifre</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required/>

    <div class="totp-wrap" id="totp-wrap">
      <label for="totp">Doğrulama Kodu (6 hane)</label>
      <input id="totp" type="text" inputmode="numeric" pattern="[0-9]{6}" placeholder="000000" autocomplete="one-time-code" maxlength="6"/>
    </div>

    <button class="btn" type="submit" id="btn">Giriş Yap</button>
    <div class="error" id="error"></div>
  </form>
</div>

<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Giriş yapılıyor…';

  const body = {
    username: document.getElementById('username').value.trim(),
    password: document.getElementById('password').value,
    totp: document.getElementById('totp').value.trim() || undefined
  };

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (res.ok) {
      window.location.href = '/admin.html';
      return;
    }

    if (data.require2fa) {
      document.getElementById('totp-wrap').classList.add('show');
      document.getElementById('totp').focus();
      err.textContent = 'Authenticator uygulamanızdaki 6 haneli kodu girin.';
      err.style.background = '#0a1a2a';
      err.style.borderColor = '#1a4a6a';
      err.style.color = '#7dc4f0';
      err.classList.add('show');
    } else {
      err.style = '';
      err.textContent = data.error || 'Giriş başarısız.';
      err.classList.add('show');
    }
  } catch (ex) {
    err.textContent = 'Sunucuya bağlanılamadı.';
    err.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = 'Giriş Yap';
}
</script>
</body>
</html>
