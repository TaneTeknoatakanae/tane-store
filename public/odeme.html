<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ödeme — Tane Store</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }
  header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header img { height: 36px; }
  header span { font-size: 18px; font-weight: 700; color: #1a1a1a; }
  .lock { color: #4caf50; font-size: 14px; display: flex; align-items: center; gap: 4px; margin-left: auto; }

  .container { max-width: 960px; margin: 32px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 420px; gap: 24px; }
  @media(max-width:740px){ .container { grid-template-columns: 1fr; } }

  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 24px; }
  .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }

  .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; gap: 12px; }
  .item-row:last-child { border: none; }
  .item-name { flex: 1; color: #333; }
  .item-qty { color: #888; font-size: 12px; }
  .item-price { font-weight: 600; white-space: nowrap; }
  .total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; padding-top: 16px; border-top: 2px solid #f0f0f0; margin-top: 8px; }
  .total-row .amount { color: #e53935; }
  .shipping-note { font-size: 12px; color: #4caf50; margin-top: 6px; text-align: right; }

  .info-row { display: flex; gap: 8px; font-size: 13px; padding: 4px 0; }
  .info-label { color: #888; min-width: 80px; }
  .info-val { font-weight: 500; }

  /* PayTR iFrame — iFrameResizer handles height automatically */
  #iframe-wrapper { display: none; }
  #paytr-iframe { width: 100%; border: none; }

  #loading { text-align: center; padding: 48px 16px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #f0f0f0; border-top-color: #333; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #666; font-size: 14px; }

  #error-box { display: none; background: #fff3f3; border: 1px solid #f5c6c6; border-radius: 8px; padding: 16px; color: #c62828; font-size: 14px; }
  #error-box a { display: inline-block; margin-top: 12px; background: #333; color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; }

  #result-screen { display: none; text-align: center; padding: 48px 16px; }
  #result-screen .icon { font-size: 56px; margin-bottom: 16px; }
  #result-screen h2 { font-size: 22px; margin-bottom: 8px; }
  #result-screen p { color: #666; font-size: 14px; margin-bottom: 24px; }
  #result-screen a { display: inline-block; background: #333; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; }

  .secure-badges { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 20px; color: #888; font-size: 12px; }
  .secure-badges span { display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<header>
  <img src="/AmblemTane.png" alt="Tane Store" onerror="this.style.display='none'">
  <span>Tane Store</span>
  <div class="lock">🔒 Güvenli Ödeme</div>
</header>

<div class="container">
  <div>
    <div class="card" id="summary-card">
      <h2>Sipariş Özeti</h2>
      <div id="items-list"></div>
      <div class="total-row">
        <span>Toplam</span>
        <span class="amount" id="total-display"></span>
      </div>
      <div class="shipping-note" id="shipping-note"></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h2>Teslimat Bilgileri</h2>
      <div id="customer-info"></div>
    </div>
  </div>

  <div>
    <div class="card">
      <h2>Ödeme</h2>

      <div id="loading">
        <div class="spinner"></div>
        <p>Güvenli ödeme formu hazırlanıyor…</p>
      </div>

      <div id="error-box">
        <strong>Ödeme başlatılamadı.</strong><br>
        <span id="error-msg"></span>
        <a href="/">Ana Sayfaya Dön</a>
      </div>

      <!-- PayTR iFrame — doküman gereksinimi: iframeResizer + /odeme/guvenli/ URL -->
      <div id="iframe-wrapper">
        <script src="https://www.paytr.com/js/iframeResizer.min.js"></script>
        <iframe src="" id="paytriframe" frameborder="0" scrolling="no" style="width:100%;"></iframe>
        <script>iFrameResize({},'#paytriframe');</script>
      </div>

      <div id="result-screen">
        <div class="icon" id="result-icon"></div>
        <h2 id="result-title"></h2>
        <p id="result-desc"></p>
        <a href="/" id="result-link">Ana Sayfaya Dön</a>
      </div>

      <div class="secure-badges">
        <span>🔒 SSL Şifreli</span>
        <span>🛡️ 3D Secure</span>
        <span>💳 PayTR</span>
      </div>
    </div>
  </div>
</div>

<script>
const params        = new URLSearchParams(location.search);
const orderId       = params.get('order_id');
const paytrToken    = params.get('token');
const FREE_SHIPPING = 4000;

function fmt(n) { return new Intl.NumberFormat('tr-TR', { style:'currency', currency:'TRY', minimumFractionDigits:2 }).format(n); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderSummary() {
  const raw = sessionStorage.getItem('tane_last_order');
  if (!raw) return;
  try {
    const order = JSON.parse(raw);
    const list = document.getElementById('items-list');
    list.innerHTML = (order.items || []).map(i => `
      <div class="item-row">
        <div>
          <div class="item-name">${escHtml(i.product_name)}</div>
          <div class="item-qty">Adet: ${i.quantity}</div>
        </div>
        <div class="item-price">${fmt(i.price * i.quantity)}</div>
      </div>
    `).join('');
    const total = (order.items || []).reduce((s, i) => s + i.price * i.quantity, 0);
    document.getElementById('total-display').textContent = fmt(total);
    document.getElementById('shipping-note').textContent =
      total >= FREE_SHIPPING ? '✅ Ücretsiz kargo' : `${fmt(FREE_SHIPPING - total)} daha alın, kargo bedava!`;
    document.getElementById('customer-info').innerHTML = `
      <div class="info-row"><span class="info-label">Ad Soyad</span><span class="info-val">${escHtml(order.customer_name)}</span></div>
      <div class="info-row"><span class="info-label">Telefon</span><span class="info-val">${escHtml(order.customer_phone)}</span></div>
      <div class="info-row"><span class="info-label">Şehir</span><span class="info-val">${escHtml(order.customer_city)}</span></div>
      <div class="info-row"><span class="info-label">Adres</span><span class="info-val">${escHtml(order.customer_address)}</span></div>
    `;
  } catch(_) {}
}

function loadPayment() {
  if (!paytrToken) {
    showError('Ödeme token\'ı bulunamadı. Lütfen sepete dönüp tekrar deneyin.');
    return;
  }
  document.getElementById('loading').style.display = 'none';
  // Doküman: iframe src = https://www.paytr.com/odeme/guvenli/{token}
  document.getElementById('paytriframe').src = `https://www.paytr.com/odeme/guvenli/${paytrToken}`;
  document.getElementById('iframe-wrapper').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-box').style.display = 'block';
}

// PayTR ödeme sonucunu postMessage ile bildirir
window.addEventListener('message', function(ev) {
  if (ev.origin !== 'https://www.paytr.com') return;
  const msg = ev.data;
  const isResult = msg === 'success' || msg === 'fail' ||
    (typeof msg === 'object' && (msg.status === 'success' || msg.status === 'fail'));
  if (!isResult) return;

  document.getElementById('iframe-wrapper').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const isSuccess = msg === 'success' || (typeof msg === 'object' && msg.status === 'success');
  if (isSuccess) {
    document.getElementById('result-icon').textContent  = '✅';
    document.getElementById('result-title').textContent = 'Ödeme Başarılı!';
    document.getElementById('result-desc').textContent  = `Siparişiniz #${orderId} alındı. Teşekkür ederiz!`;
    document.getElementById('result-link').href         = `/track?id=${orderId}`;
    document.getElementById('result-link').textContent  = 'Siparişi Takip Et';
    sessionStorage.removeItem('tane_last_order');
  } else {
    document.getElementById('result-icon').textContent  = '❌';
    document.getElementById('result-title').textContent = 'Ödeme Başarısız';
    document.getElementById('result-desc').textContent  = 'Ödeme işlemi tamamlanamadı. Lütfen tekrar deneyin.';
    document.getElementById('result-link').href         = 'javascript:history.back()';
    document.getElementById('result-link').textContent  = 'Geri Dön';
  }
});

renderSummary();
loadPayment();
</script>
</body>
</html>
