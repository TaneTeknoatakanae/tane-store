<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tane Store — Hesabım</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#f5f5f7;min-height:100vh}
nav{background:#0f0f0f;border-bottom:1px solid #1c1c1e;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-weight:700;font-size:18px;color:#f5f5f7;text-decoration:none;letter-spacing:-0.5px}
.logo span{color:#e85d00}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{color:#98989d;font-size:13px;text-decoration:none;transition:color .15s}
.nav-link:hover{color:#f5f5f7}
.btn-logout{background:none;border:1px solid #2a2a2a;color:#98989d;padding:6px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.btn-logout:hover{border-color:#ff453a;color:#ff453a}

.main{max-width:860px;margin:40px auto;padding:0 24px}
.page-title{font-size:26px;font-weight:700;margin-bottom:4px;letter-spacing:-0.5px}
.page-sub{color:#98989d;font-size:14px;margin-bottom:28px}

.tabs{display:flex;gap:2px;margin-bottom:24px;background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:4px}
.tab{flex:1;padding:9px;border:none;background:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:#98989d;transition:all .2s}
.tab.active{background:#2a2a2a;color:#f5f5f7}
.tab-panel{display:none}
.tab-panel.active{display:block}

.card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:24px;margin-bottom:16px}
.card h3{font-size:15px;font-weight:600;margin-bottom:20px;color:#f5f5f7}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field{margin-bottom:12px}
label{font-size:11px;font-weight:500;color:#98989d;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;outline:none;color:#f5f5f7;background:#1c1c1e;transition:border .2s}
input::placeholder{color:#48484a}
input:focus{border-color:#3a3a3a}
.btn{background:#e85d00;color:#fff;border:none;padding:10px 22px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:background .15s}
.btn:hover{background:#ff6a00}
.ok{color:#30d158;font-size:13px;font-weight:500;margin-top:8px;display:none}
.err-msg{color:#ff453a;font-size:13px;font-weight:500;margin-top:8px;display:none}

.order-row{border:1px solid #2a2a2a;border-radius:10px;padding:16px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;background:#141414}
.order-id{font-weight:700;font-size:14px;color:#e85d00}
.order-date{font-size:12px;color:#48484a;margin-top:2px}
.order-total{font-weight:600;font-size:14px;color:#f5f5f7}
.status-badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.status-Beklemede{background:#2a1800;color:#e85d00;border:1px solid #3a2000}
.status-Onaylandı{background:#001a2a;color:#0a84ff;border:1px solid #002a3a}
.status-Kargoda{background:#001a0a;color:#30d158;border:1px solid #002a10}
.status-Teslim{background:#001a0a;color:#30d158;border:1px solid #002a10}
.status-İptal{background:#2a0a0a;color:#ff453a;border:1px solid #3a1010}
.btn-track{font-size:12px;color:#e85d00;font-weight:500;text-decoration:none}
.btn-track:hover{color:#ff6a00}
.btn-cancel{font-size:12px;color:#ff453a;background:none;border:1px solid #3a1010;border-radius:6px;padding:3px 10px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:#2a0a0a}
.empty{text-align:center;padding:48px 0;color:#48484a;font-size:14px}

.wish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.wish-card{background:#141414;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;text-decoration:none;color:inherit;transition:border-color .2s;position:relative}
.wish-card:hover{border-color:#3a3a3a}
.wish-img{width:100%;aspect-ratio:1;object-fit:contain;background:#111;padding:8px}
.wish-info{padding:10px}
.wish-name{font-size:12px;color:#98989d;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wish-price{font-weight:700;font-size:13px;color:#e85d00}
.wish-remove{position:absolute;top:8px;right:8px;background:#1c1c1e;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;color:#48484a;display:flex;align-items:center;justify-content:center;transition:all .15s}
.wish-remove:hover{background:#2a0a0a;color:#ff453a}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">TANE <span>STORE</span></a>
  <div class="nav-right">
    <a href="/" class="nav-link">← Alışverişe Dön</a>
    <button onclick="logout()" class="btn-logout">Çıkış Yap</button>
  </div>
</nav>
<div class="main">
  <div class="page-title">Hesabım</div>
  <p class="page-sub" id="welcome-msg">Merhaba!</p>

  <div class="tabs">
    <button class="tab active" onclick="showTab('orders')">Siparişlerim</button>
    <button class="tab" onclick="showTab('wishlist')">Favorilerim</button>
    <button class="tab" onclick="showTab('profile')">Profil</button>
    <button class="tab" onclick="showTab('password')">Şifre</button>
  </div>

  <div id="panel-orders" class="tab-panel active">
    <div id="orders-list"><div class="empty">Yükleniyor...</div></div>
  </div>

  <div id="panel-wishlist" class="tab-panel">
    <div id="wishlist-grid" class="wish-grid"></div>
    <div id="wishlist-empty" class="empty" style="display:none">Henüz favori ürün eklemediniz.</div>
  </div>

  <div id="panel-profile" class="tab-panel">
    <div class="card">
      <h3>Profil Bilgileri</h3>
      <div class="field-row">
        <div class="field"><label>Ad Soyad</label><input id="p-name" type="text"/></div>
        <div class="field"><label>Telefon</label><input id="p-phone" type="tel"/></div>
      </div>
      <div class="field"><label>Adres</label><input id="p-address" type="text" placeholder="Teslimat adresiniz"/></div>
      <div class="field"><label>Şehir</label><input id="p-city" type="text"/></div>
      <div style="display:flex;gap:12px;align-items:center;margin-top:4px">
        <button class="btn" onclick="saveProfile()">Kaydet</button>
        <span class="ok" id="profile-ok">Kaydedildi</span>
        <span class="err-msg" id="profile-err"></span>
      </div>
    </div>
  </div>

  <div id="panel-password" class="tab-panel">
    <div class="card">
      <h3>Şifre Değiştir</h3>
      <div class="field"><label>Mevcut Şifre</label><input id="pw-current" type="password"/></div>
      <div class="field"><label>Yeni Şifre</label><input id="pw-new" type="password" placeholder="En az 6 karakter"/></div>
      <div class="field"><label>Yeni Şifre Tekrar</label><input id="pw-new2" type="password"/></div>
      <div style="display:flex;gap:12px;align-items:center;margin-top:4px">
        <button class="btn" onclick="savePassword()">Güncelle</button>
        <span class="ok" id="pw-ok">Şifre güncellendi</span>
        <span class="err-msg" id="pw-err"></span>
      </div>
    </div>
  </div>
</div>

<script>
let currentUser = null;

async function init() {
  const res = await fetch('/api/auth/me', { credentials: 'include' });
  if (!res.ok) { window.location.href = '/login?next=/hesabim'; return; }
  currentUser = await res.json();
  document.getElementById('welcome-msg').textContent = `Merhaba, ${currentUser.name}!`;
  document.getElementById('p-name').value = currentUser.name || '';
  document.getElementById('p-phone').value = currentUser.phone || '';
  document.getElementById('p-address').value = currentUser.address || '';
  document.getElementById('p-city').value = currentUser.city || '';
  loadOrders(); loadWishlist();
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['orders','wishlist','profile','password'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

async function loadOrders() {
  const res = await fetch('/api/orders/mine', { credentials: 'include' });
  if (!res.ok) { document.getElementById('orders-list').innerHTML = '<div class="empty">Siparişler yüklenemedi.</div>'; return; }
  const orders = await res.json();
  if (!orders.length) { document.getElementById('orders-list').innerHTML = '<div class="empty">Henüz sipariş vermediniz.</div>'; return; }
  document.getElementById('orders-list').innerHTML = orders.map(o => {
    const statusKey = o.status === 'Teslim Edildi' ? 'Teslim' : o.status === 'İptal' ? 'İptal' : o.status.split(' ')[0];
    const canCancel = o.status === 'Beklemede';
    return `<div class="order-row" id="order-row-${o.id}">
      <div>
        <div class="order-id">#${o.id}</div>
        <div class="order-date">${new Date(o.created_at).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <div style="flex:1;padding:0 16px;font-size:12px;color:#48484a">${o.items || ''}</div>
      <div style="text-align:right">
        <div class="order-total">${o.total_price.toLocaleString('tr-TR')} ₺</div>
        <span class="status-badge status-${statusKey}">${o.status}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <a href="/track?id=${o.id}" class="btn-track">Takip Et →</a>
        ${canCancel ? `<button onclick="cancelOrder(${o.id})" class="btn-cancel">İptal Et</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function loadWishlist() {
  const res = await fetch('/api/wishlist', { credentials: 'include' });
  if (!res.ok) return;
  const items = await res.json();
  const grid = document.getElementById('wishlist-grid');
  if (!items.length) { grid.innerHTML = ''; document.getElementById('wishlist-empty').style.display = 'block'; return; }
  document.getElementById('wishlist-empty').style.display = 'none';
  grid.innerHTML = items.map(p => {
    const price = p.discount_price || p.tane_price;
    return `<div class="wish-card">
      <button class="wish-remove" onclick="removeWish(${p.product_id}, this)" title="Favorilerden çıkar">×</button>
      <a href="/product.html?id=${p.product_id}" style="display:block">
        <img class="wish-img" src="${p.image_url || ''}" alt="${p.name}" onerror="this.style.visibility='hidden'"/>
        <div class="wish-info">
          <div class="wish-name">${p.name}</div>
          <div class="wish-price">${price ? price.toLocaleString('tr-TR') + ' ₺' : '—'}</div>
        </div>
      </a>
    </div>`;
  }).join('');
}

async function removeWish(productId, btn) {
  await fetch(`/api/wishlist/${productId}`, { method: 'DELETE', credentials: 'include' });
  btn.closest('.wish-card').remove();
  const grid = document.getElementById('wishlist-grid');
  if (!grid.children.length) document.getElementById('wishlist-empty').style.display = 'block';
}

async function saveProfile() {
  const body = { name: document.getElementById('p-name').value.trim(), phone: document.getElementById('p-phone').value.trim(), address: document.getElementById('p-address').value.trim(), city: document.getElementById('p-city').value.trim() };
  if (!body.name) return;
  const res = await fetch('/api/auth/profile', { method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify(body) });
  const data = await res.json();
  if (res.ok) show('profile-ok'); else showErr('profile-err', data.error);
}

async function savePassword() {
  const current = document.getElementById('pw-current').value;
  const pw = document.getElementById('pw-new').value;
  const pw2 = document.getElementById('pw-new2').value;
  if (pw !== pw2) return showErr('pw-err', 'Şifreler eşleşmiyor');
  if (pw.length < 6) return showErr('pw-err', 'En az 6 karakter');
  const res = await fetch('/api/auth/password', { method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ current_password: current, new_password: pw }) });
  const data = await res.json();
  if (res.ok) { show('pw-ok'); ['pw-current','pw-new','pw-new2'].forEach(id => document.getElementById(id).value=''); }
  else showErr('pw-err', data.error);
}

async function cancelOrder(id) {
  if (!confirm('Siparişi iptal etmek istediğinize emin misiniz?')) return;
  const res = await fetch(`/api/orders/${id}/cancel`, { method: 'PUT', credentials: 'include' });
  if (res.ok) loadOrders();
}

async function logout() {
  await fetch('/api/auth/logout', { method:'POST', credentials:'include' });
  window.location.href = '/';
}

function show(id) { const el = document.getElementById(id); el.style.display='inline'; setTimeout(()=>el.style.display='none',3000); }
function showErr(id, msg) { const el = document.getElementById(id); el.textContent=msg; el.style.display='inline'; setTimeout(()=>el.style.display='none',4000); }

init();
</script>
</body>
</html>
