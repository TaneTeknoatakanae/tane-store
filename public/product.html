<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tane Store — Ürün</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FDFAF6;
  --surface:#F5EFE4;
  --border-light:#EDE4D4;
  --border:#DDD0BC;
  --text:#1C1814;
  --text2:#6B5E50;
  --text3:#A89480;
  --accent:#C49660;
  --accent-h:#A67D48;
  --green:#1a7a3a;
  --green-bg:#f0faf4;
  --red:#c00;
  --r:10px;
  --r-lg:16px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);
  --shadow:0 4px 20px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}

/* NAV */
.nav{background:rgba(253,250,246,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:100;height:60px;display:flex;align-items:center;padding:0 24px;gap:16px}
.logo{font-weight:700;font-size:18px;color:var(--text);text-decoration:none;letter-spacing:-.5px;flex-shrink:0}

.nav-spacer{flex:1}
.nav-link{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 10px;border-radius:8px;white-space:nowrap;transition:color .15s}
.nav-link:hover{color:var(--text)}
.btn-cart{display:flex;align-items:center;gap:8px;background:var(--text);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-cart:hover{background:#333}
.cart-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* BREADCRUMB */
.breadcrumb{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3)}
.breadcrumb a{color:var(--text2);text-decoration:none;transition:color .15s}
.breadcrumb a:hover{color:var(--text)}
.bc-sep{color:var(--border)}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:0 24px 80px}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;margin-bottom:40px}

/* GALLERY */
.gallery-wrap{position:sticky;top:76px}
.gallery-main{position:relative;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);overflow:hidden;aspect-ratio:1}
.gallery-main img{width:100%;height:100%;object-fit:contain;display:block;padding:20px;transition:opacity .2s}
.gallery-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px}
.gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text2);z-index:2;transition:all .15s;backdrop-filter:blur(8px)}
.gallery-arrow:hover{background:var(--bg);box-shadow:var(--shadow-sm);color:var(--text)}
.gallery-arrow.prev{left:12px}
.gallery-arrow.next{right:12px}
.gallery-arrow.hidden{display:none}
.gallery-dots{display:flex;justify-content:center;gap:5px;margin-top:10px}
.gallery-dot{width:5px;height:5px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}
.gallery-dot.active{background:var(--text);width:16px;border-radius:3px}
.gallery-thumbs{display:flex;gap:8px;margin-top:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.gallery-thumbs::-webkit-scrollbar{display:none}
.gallery-thumb{flex-shrink:0;width:64px;height:64px;border-radius:8px;object-fit:contain;border:2px solid transparent;cursor:pointer;background:var(--surface);padding:5px;transition:all .15s}
.gallery-thumb.active{border-color:var(--text)}
.gallery-thumb:hover:not(.active){border-color:var(--border)}

/* PRODUCT INFO */
.product-category{font-size:12px;color:var(--text3);margin-bottom:8px;letter-spacing:.3px}
.product-name{font-size:22px;font-weight:700;line-height:1.35;margin-bottom:12px;letter-spacing:-.3px}
.rating-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.stars{color:#f5a623;font-size:14px;letter-spacing:1px}
.review-count{font-size:12px;color:var(--text2)}
.sku{font-size:12px;color:var(--text3);margin-bottom:20px}

/* BUY BOX */
.buy-box{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:24px;margin-bottom:16px}
.price-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.price-original{font-size:13px;color:var(--text3);text-decoration:line-through;margin-bottom:4px}
.price-main{font-size:32px;font-weight:700;color:var(--text);letter-spacing:-.5px;line-height:1}
.price-main.sale{color:var(--accent)}
.discount-tag{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;margin-left:10px;vertical-align:middle}
.stock-tag{display:inline-block;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;margin-top:12px}
.in-stock{background:var(--green-bg);color:var(--green)}
.low-stock{background:#FDF5EB;color:var(--accent)}
.out-stock{background:#fff5f5;color:var(--red)}

/* PRICE COMPARE */
.compare-box{border:1px solid var(--border-light);border-radius:var(--r-lg);padding:16px;margin-bottom:16px}
.box-title{font-size:13px;font-weight:600;margin-bottom:12px}
.cmp-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;border:1px solid var(--border-light);margin-bottom:6px;background:var(--bg)}
.cmp-row:last-child{margin-bottom:0}
.cmp-row.best{background:var(--green-bg);border-color:#c8e8d4}
.cmp-name{font-size:13px;font-weight:500}
.cmp-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:var(--green-bg);color:var(--green);margin-left:6px}
.cmp-price{font-size:13px;font-weight:600}
.cmp-diff{font-size:11px;color:var(--red);margin-left:6px}

/* ACTIONS */
.actions{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.qty-row{display:flex;align-items:center;gap:12px}
.qty-label{font-size:13px;color:var(--text2)}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg)}
.qty-ctrl button{width:38px;height:40px;border:none;background:transparent;cursor:pointer;font-size:18px;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center}
.qty-ctrl button:hover{background:var(--surface);color:var(--text)}
.qty-ctrl input{width:48px;height:40px;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-family:inherit;font-size:15px;font-weight:600;outline:none;background:var(--bg);color:var(--text)}
.btn-add{background:var(--accent);color:#fff;border:none;padding:14px;border-radius:var(--r);font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:background .15s}
.btn-add:hover:not(:disabled){background:var(--accent-h)}
.btn-add:disabled{background:var(--surface);color:var(--text3);cursor:not-allowed;border:1px solid var(--border)}
.btn-wish{background:var(--bg);color:var(--text2);border:1px solid var(--border);padding:13px;border-radius:var(--r);font-family:inherit;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-wish:hover{border-color:#bbb;color:var(--text)}
.btn-wish.active{background:#fff5f5;border-color:#fca5a5;color:var(--red)}

/* TRUST BULLETS */
.trust-bullets{display:flex;flex-direction:column;gap:6px;padding:14px 0 2px;border-top:1px solid var(--border-light);margin-top:4px}
.trust-bullet{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.trust-bullet svg{color:var(--green);flex-shrink:0}

/* DESC BOX */
.desc-box{border:1px solid var(--border-light);border-radius:var(--r-lg);padding:20px;margin-bottom:16px;background:var(--bg)}
.desc-text{font-size:14px;color:var(--text2);line-height:1.8;max-height:160px;overflow:hidden;transition:max-height .35s}
.desc-text.expanded{max-height:2000px}
.btn-desc-more{background:none;border:none;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;padding:10px 0;display:block}

/* REVIEWS */
.reviews-box{border:1px solid var(--border-light);border-radius:var(--r-lg);padding:20px;margin-bottom:16px;background:var(--bg)}
.reviews-summary{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border-light)}
.rating-big{font-size:44px;font-weight:700;line-height:1}
.stars-big{color:#f5a623;font-size:18px;letter-spacing:2px}
.reviews-count{font-size:13px;color:var(--text2);margin-top:4px}
.review-card{padding:14px;background:var(--surface);border-radius:8px;margin-bottom:8px}
.review-header{display:flex;justify-content:space-between;margin-bottom:4px}
.reviewer{font-size:13px;font-weight:500}
.review-date{font-size:12px;color:var(--text3)}
.review-stars{color:#f5a623;font-size:13px;margin-bottom:6px}
.review-text{font-size:13px;color:var(--text2);line-height:1.6}
.add-review{border-top:1px solid var(--border-light);padding-top:20px;margin-top:8px}
.add-review h4{font-size:14px;font-weight:600;margin-bottom:14px}
.star-selector{display:flex;gap:6px;margin-bottom:12px}
.star-opt{font-size:28px;cursor:pointer;color:var(--border);transition:color .1s;line-height:1;user-select:none}
.star-opt.selected,.star-opt:hover{color:#f5a623}
.form-group{margin-bottom:10px}
.form-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px;display:block}
.form-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;background:var(--bg);color:var(--text)}
.form-input:focus{border-color:#999}
.form-input::placeholder{color:var(--text3)}
.btn-review{background:var(--text);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:inherit;font-weight:500;font-size:13px;cursor:pointer;transition:background .15s}
.btn-review:hover{background:#333}

/* SIMILAR */
.similar-wrap{margin-top:24px}
.section-title{font-size:17px;font-weight:600;margin-bottom:16px}
.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.sim-card{background:var(--bg);border:1px solid var(--border-light);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.sim-card:hover{border-color:var(--border);box-shadow:var(--shadow-sm)}
.sim-img{width:100%;height:130px;object-fit:contain;background:var(--surface);padding:8px}
.sim-body{padding:10px 12px}
.sim-name{font-size:12px;color:var(--text2);line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sim-price{font-weight:700;font-size:13px;color:var(--accent)}

/* CART DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.cart-side{position:fixed;top:0;right:0;bottom:0;width:380px;background:var(--bg);z-index:201;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--border)}
.cart-side.open{transform:translateX(0)}
.cart-head{padding:20px 24px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.cart-head-title{font-size:16px;font-weight:600}
.cart-close{background:none;border:none;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text2);transition:all .15s}
.cart-close:hover{background:var(--surface);color:var(--text)}
.cart-items-wrap{flex:1;overflow-y:auto;padding:0 24px}
.cart-empty{text-align:center;padding:64px 0;color:var(--text2);font-size:14px}
.cart-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border-light)}
.ci-img{width:56px;height:56px;object-fit:contain;border-radius:8px;background:var(--surface);flex-shrink:0;padding:4px}
.ci-ph{width:56px;height:56px;border-radius:8px;background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3)}
.ci-body{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:500;line-height:1.4;color:var(--text);margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ci-price{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.ci-qty{display:flex;align-items:center;gap:10px}
.qty-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--bg);border-radius:6px;cursor:pointer;font-size:15px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.qty-btn:hover{border-color:var(--text);color:var(--text)}
.qty-num{font-size:14px;font-weight:600;min-width:20px;text-align:center}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;line-height:1;margin-left:auto;align-self:flex-start;padding:2px 4px;transition:color .15s}
.rm-btn:hover{color:var(--red)}
.cart-foot{padding:20px 24px;border-top:1px solid var(--border-light)}
.ship-note{font-size:12px;color:var(--text2);margin-bottom:8px}
.ship-bar{height:3px;background:var(--border-light);border-radius:2px;margin-bottom:6px;overflow:hidden}
.ship-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.ship-free{font-size:12px;font-weight:600;color:var(--green);margin-bottom:12px}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cart-total-lbl{font-size:14px;color:var(--text2)}
.cart-total-val{font-size:22px;font-weight:700}
.btn-checkout{width:100%;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:var(--r);font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:background .15s}
.btn-checkout:hover{background:var(--accent-h)}
.cart-trust{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-size:11px;color:var(--text3)}

/* ORDER MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:var(--r-lg);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;transform:translateY(10px);transition:transform .25s}
.modal-bg.open .modal{transform:translateY(0)}
.modal-head{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:20px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text2);transition:all .15s}
.modal-close:hover{background:var(--surface);color:var(--text)}
.modal-body{padding:20px 24px 28px}
.order-sum{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:16px;margin-bottom:20px}
.order-sum-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.order-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:6px;gap:8px}
.order-row span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.order-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;border-top:1px solid var(--border);padding-top:10px;margin-top:8px}
.coupon-row{display:flex;gap:8px;margin-bottom:16px}
.coupon-in{flex:1;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:13px;outline:none;text-transform:uppercase;color:var(--text);background:var(--bg)}
.coupon-in::placeholder{color:var(--text3)}
.coupon-in:focus{border-color:#999}
.btn-coupon{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-coupon:hover{background:var(--text);color:#fff;border-color:var(--text)}
.coupon-ok{font-size:12px;color:var(--green);font-weight:600;margin-bottom:12px}
.coupon-err{font-size:12px;color:var(--red);margin-bottom:12px}
.fg{margin-bottom:12px}
.fl{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px}
.fi{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:14px;outline:none;color:var(--text);background:var(--bg);transition:border-color .2s}
.fi:focus{border-color:#999}
.fi::placeholder{color:var(--text3)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-order{width:100%;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:var(--r);font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;margin-top:12px;transition:background .15s}
.btn-order:hover{background:var(--accent-h)}
.btn-order:disabled{opacity:.6;cursor:not-allowed}
.btn-back-m{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border);padding:12px;border-radius:var(--r);font-family:inherit;font-size:14px;cursor:pointer;margin-top:8px;transition:all .15s}
.btn-back-m:hover{border-color:#bbb;color:var(--text)}
.modal-trust{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;font-size:11px;color:var(--text3)}
.success-screen{text-align:center;padding:20px 0 8px}
.success-icon{width:56px;height:56px;background:var(--green-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.success-order-num{font-size:32px;font-weight:700;color:var(--accent);margin:8px 0}
.success-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.btn-track-link{display:inline-block;background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--r);font-family:inherit;font-weight:600;font-size:14px;text-decoration:none;transition:background .15s}
.btn-track-link:hover{background:#333}

/* MOBILE STICKY BUY */
.mobile-buy{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border-light);padding:12px 20px;z-index:50;gap:12px;align-items:center}
.mobile-price{font-size:18px;font-weight:700;color:var(--text)}
.mobile-price.sale{color:var(--accent)}
.mobile-add{flex:1;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:var(--r);font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:background .15s}
.mobile-add:hover{background:var(--accent-h)}
.mobile-add:disabled{background:var(--surface);color:var(--text3);border:1px solid var(--border);cursor:not-allowed}

/* LOADING */
.loading{text-align:center;padding:80px 0;color:var(--text3);font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;display:none;white-space:nowrap;box-shadow:var(--shadow)}

.hidden{display:none!important}

@media(max-width:900px){
  .product-grid{grid-template-columns:1fr;gap:32px}
  .gallery-wrap{position:static}
  .mobile-buy{display:flex}
  .actions .btn-add{display:none}
  .nav-link{display:none}
}
@media(max-width:600px){
  .main{padding:0 16px 100px}
  .breadcrumb{padding:12px 16px}
  .fr{grid-template-columns:1fr}
  .cart-side{width:100%}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="/landing"><img src="/AmblemTane.png" alt="Tane Store" style="height:38px;display:block"></a>
  <div class="nav-spacer"></div>
  <a href="/track" class="nav-link">Siparişim</a>
  <div id="auth-nav"><a href="/login" class="nav-link">Giriş</a></div>
  <button class="btn-cart" onclick="toggleCart()">
    Sepet <span class="cart-badge" id="cart-count">0</span>
  </button>
</nav>

<div class="breadcrumb">
  <a href="/">Ana Sayfa</a>
  <span class="bc-sep">›</span>
  <span id="breadcrumb-name" style="color:var(--text2)">Ürün</span>
</div>

<div class="main" id="main-content">
  <div class="loading">Yükleniyor…</div>
</div>

<!-- MOBILE STICKY BUY -->
<div class="mobile-buy" id="mobile-buy">
  <span class="mobile-price" id="mobile-price"></span>
  <button class="mobile-add" id="mobile-add-btn" onclick="addToCart()">Sepete Ekle</button>
</div>

<!-- CART -->
<div class="overlay" id="cart-overlay" onclick="toggleCart()"></div>
<aside class="cart-side" id="cart-side">
  <div class="cart-head">
    <span class="cart-head-title">Sepetim</span>
    <button class="cart-close" onclick="toggleCart()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="cart-items-wrap" id="cart-items-el"></div>
  <div class="cart-foot" id="cart-foot" style="display:none">
    <div id="ship-info"></div>
    <div class="cart-total-row">
      <span class="cart-total-lbl">Toplam</span>
      <span class="cart-total-val" id="cart-total">0 ₺</span>
    </div>
    <button class="btn-checkout" onclick="openOrderModal()">Siparişi Tamamla</button>
    <div class="cart-trust">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      SSL güvenli · iyzico ile ödeme
    </div>
  </div>
</aside>

<!-- ORDER MODAL -->
<div class="modal-bg" id="order-modal">
  <div class="modal">
    <div id="order-form-screen">
      <div class="modal-head">
        <h2>Sipariş Ver</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="order-sum" id="order-summary"></div>
        <div class="coupon-row">
          <input class="coupon-in" id="coupon-code" placeholder="KUPON KODU"/>
          <button class="btn-coupon" onclick="applyCoupon()">Uygula</button>
        </div>
        <div id="coupon-result"></div>
        <div class="fr">
          <div class="fg"><label class="fl">Ad Soyad *</label><input class="fi" id="o-name" autocomplete="name" placeholder="Ahmet Yılmaz"/></div>
          <div class="fg"><label class="fl">Telefon *</label><input class="fi" id="o-phone" type="tel" autocomplete="tel" placeholder="05xx xxx xx xx"/></div>
        </div>
        <div class="fg"><label class="fl">E-posta <span style="color:var(--text3);font-weight:400">(isteğe bağlı)</span></label><input class="fi" id="o-email" type="email" autocomplete="email" placeholder="ahmet@mail.com"/></div>
        <div class="fg"><label class="fl">Teslimat Adresi *</label><input class="fi" id="o-address" autocomplete="street-address" placeholder="Mahalle, sokak, kapı no, daire…"/></div>
        <div class="fr">
          <div class="fg"><label class="fl">Şehir *</label><input class="fi" id="o-city" autocomplete="address-level2" placeholder="İstanbul"/></div>
          <div class="fg"><label class="fl">Kargo Notu</label><input class="fi" id="o-note" placeholder="İsteğe bağlı…"/></div>
        </div>
        <button class="btn-order" id="btn-order" onclick="submitOrder()">Siparişi Onayla</button>
        <button class="btn-back-m" onclick="closeModal()">Vazgeç</button>
        <div class="modal-trust">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          256-bit SSL şifreli · iyzico güvenli ödeme
        </div>
      </div>
    </div>
    <div id="order-success-screen" class="hidden modal-body">
      <div class="success-screen">
        <div class="success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a7a3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <p style="font-size:14px;color:var(--text2)">Siparişiniz alındı!</p>
        <div class="success-order-num" id="success-order-id">#0</div>
        <p class="success-sub">Kargo takip bilgisini SMS ve e-posta ile paylaşacağız.</p>
        <a id="track-link" href="/track" class="btn-track-link">Siparişimi Takip Et</a>
        <button class="btn-back-m" style="margin-top:10px" onclick="closeModal()">Alışverişe Devam Et</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
let product = null, cart = [], wishlist = [], currentUser = null, selectedRating = 0;
let galleryImages = [], currentImg = 0, appliedCoupon = null;

async function initAuth() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.ok) {
      currentUser = await res.json();
      document.getElementById('auth-nav').innerHTML = `<a href="/hesabim" class="nav-link">${currentUser.name.split(' ')[0]}</a>`;
      const cr = await fetch('/api/cart', { credentials: 'include' });
      if (cr.ok) { const items = await cr.json(); cart = items.map(i => ({ id: i.product_id, name: i.name, tane_price: i.tane_price, discount_price: i.discount_price, image_url: i.image_url, qty: i.quantity })); }
      const wr = await fetch('/api/wishlist', { credentials: 'include' });
      if (wr.ok) { const items = await wr.json(); wishlist = items.map(i => i.product_id); }
    } else {
      cart = JSON.parse(localStorage.getItem('tane-cart') || '[]');
      wishlist = JSON.parse(localStorage.getItem('tane-wishlist') || '[]');
    }
  } catch(e) {
    cart = JSON.parse(localStorage.getItem('tane-cart') || '[]');
    wishlist = JSON.parse(localStorage.getItem('tane-wishlist') || '[]');
  }
  updateCartUI();
}

function effectivePrice(p) { return p.discount_price || p.tane_price; }

async function loadProduct() {
  if (!productId) { window.location.href = '/'; return; }
  try {
    const res = await fetch(`/api/products/${productId}`);
    product = await res.json();
    if (product.error) { window.location.href = '/'; return; }
    document.title = `${product.name} — Tane Store`;
    document.getElementById('breadcrumb-name').textContent = product.name;
    renderProduct();
    loadReviews();
    loadSimilar();
    updateWishlistBtn();
    setupMobileBuy();
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="loading">Ürün yüklenemedi.</div>';
  }
}

function setupMobileBuy() {
  if (!product) return;
  const ep = effectivePrice(product);
  const disc = product.discount_price && product.tane_price > product.discount_price;
  document.getElementById('mobile-price').textContent = ep > 0 ? ep.toLocaleString('tr-TR') + ' ₺' : '';
  document.getElementById('mobile-price').className = 'mobile-price' + (disc ? ' sale' : '');
  const btn = document.getElementById('mobile-add-btn');
  if (product.stock === 0) { btn.textContent = 'Stok tükendi'; btn.disabled = true; }
}

function renderGallery() {
  try { galleryImages = product.images ? JSON.parse(product.images) : []; } catch(e) { galleryImages = []; }
  if (!galleryImages.length && product.image_url) galleryImages = [product.image_url];
  currentImg = 0;
  const wrap = document.getElementById('gallery-wrap');
  if (!wrap) return;
  const mainSrc = galleryImages[0] || null;
  const mainHTML = mainSrc
    ? `<img id="gallery-main-img" src="${mainSrc}" alt="${product.name}" onerror="this.parentElement.innerHTML='<div class=gallery-ph>Görsel yok</div>'">`
    : `<div class="gallery-ph">Görsel yok</div>`;
  const thumbsHTML = galleryImages.length > 1
    ? `<div class="gallery-thumbs">${galleryImages.map((src, i) => `<img class="gallery-thumb${i===0?' active':''}" src="${src}" data-idx="${i}" onclick="goToImg(${i})" onerror="this.style.display='none'" loading="lazy">`).join('')}</div>` : '';
  const dotsHTML = galleryImages.length > 1
    ? `<div class="gallery-dots">${galleryImages.map((_, i) => `<div class="gallery-dot${i===0?' active':''}" onclick="goToImg(${i})"></div>`).join('')}</div>` : '';
  wrap.innerHTML = `<div class="gallery-main">
    ${mainHTML}
    <button class="gallery-arrow prev hidden" id="gallery-prev" onclick="prevImg()">‹</button>
    <button class="gallery-arrow next${galleryImages.length < 2 ? ' hidden' : ''}" id="gallery-next" onclick="nextImg()">›</button>
  </div>${dotsHTML}${thumbsHTML}`;
  const gm = wrap.querySelector('.gallery-main');
  if (gm) {
    let startX = 0;
    gm.addEventListener('touchstart', e => startX = e.touches[0].clientX, { passive: true });
    gm.addEventListener('touchend', e => { const dx = e.changedTouches[0].clientX - startX; if (dx < -50) nextImg(); else if (dx > 50) prevImg(); }, { passive: true });
  }
}

function goToImg(idx) {
  if (!galleryImages.length) return;
  currentImg = Math.max(0, Math.min(galleryImages.length - 1, idx));
  const mainImg = document.getElementById('gallery-main-img');
  if (mainImg) { mainImg.style.opacity = '0'; setTimeout(() => { mainImg.src = galleryImages[currentImg]; mainImg.style.opacity = '1'; }, 150); }
  document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === currentImg));
  document.querySelectorAll('.gallery-dot').forEach((d, i) => d.classList.toggle('active', i === currentImg));
  document.getElementById('gallery-prev').classList.toggle('hidden', currentImg === 0);
  document.getElementById('gallery-next').classList.toggle('hidden', currentImg === galleryImages.length - 1);
}
function prevImg() { goToImg(currentImg - 1); }
function nextImg() { goToImg(currentImg + 1); }

function renderProduct() {
  const ep = effectivePrice(product);
  const hasSale = product.discount_price && product.discount_price < product.tane_price;
  const discPct = hasSale ? Math.round((1 - product.discount_price / product.tane_price) * 100) : 0;

  const priceHTML = hasSale
    ? `<div class="price-original">${product.tane_price.toLocaleString('tr-TR')} ₺</div>
       <div><span class="price-main sale">${product.discount_price.toLocaleString('tr-TR')} ₺</span><span class="discount-tag">-%${discPct}</span></div>`
    : `<div class="price-main">${product.tane_price > 0 ? product.tane_price.toLocaleString('tr-TR') + ' ₺' : 'Fiyat güncelleniyor…'}</div>`;

  const stockHTML = product.stock === 0
    ? `<span class="stock-tag out-stock">Stok tükendi</span>`
    : product.stock <= 10
    ? `<span class="stock-tag low-stock">Son ${product.stock} adet kaldı</span>`
    : `<span class="stock-tag in-stock">Stokta var</span>`;

  const prices = product.prices || [];
  let compareHTML = '';
  if (prices.length > 0) {
    const sorted = [...prices].sort((a, b) => a.price - b.price).slice(0, 3);
    const rows = sorted.map(p => {
      const diff = p.price - ep;
      return `<div class="cmp-row"><span class="cmp-name">${p.platform}</span><span class="cmp-price">${p.price.toLocaleString('tr-TR')} ₺${diff > 0 ? `<span class="cmp-diff">+${diff.toLocaleString('tr-TR')} ₺</span>` : ''}</span></div>`;
    }).join('');
    const taneRow = ep > 0 ? `<div class="cmp-row best"><span class="cmp-name">Tane Store<span class="cmp-badge">EN UCUZ</span></span><span class="cmp-price" style="color:var(--green)">${ep.toLocaleString('tr-TR')} ₺</span></div>` : '';
    compareHTML = `<div class="compare-box"><div class="box-title">Fiyat Karşılaştırması</div>${taneRow}${rows}</div>`;
  }

  const starsHTML = product.rating
    ? `<div class="rating-row"><span class="stars">${'★'.repeat(Math.round(product.rating))}${'☆'.repeat(5 - Math.round(product.rating))}</span><span class="review-count">${product.rating}/5 · ${product.review_count || 0} değerlendirme</span></div>` : '';

  const descText = product.description || '';
  const isLong = descText.length > 300;

  document.getElementById('main-content').innerHTML = `
    <div class="product-grid">
      <div class="gallery-wrap" id="gallery-wrap"></div>
      <div>
        <div class="product-category">${product.category || 'Genel'}</div>
        <h1 class="product-name">${product.name}</h1>
        ${starsHTML}
        ${product.sku ? `<div class="sku">SKU: ${product.sku}</div>` : ''}

        <div class="buy-box">
          <div class="price-label">Fiyat</div>
          ${priceHTML}
          ${stockHTML}
        </div>

        ${compareHTML}

        <div class="actions">
          ${product.stock > 0 ? `<div class="qty-row">
            <span class="qty-label">Adet</span>
            <div class="qty-ctrl">
              <button onclick="changeProductQty(-1)" aria-label="Azalt">−</button>
              <input type="number" id="product-qty" value="1" min="1" max="${product.stock}" oninput="validateQty()"/>
              <button onclick="changeProductQty(1)" aria-label="Artır">+</button>
            </div>
          </div>` : ''}
          <button class="btn-add" onclick="addToCart()" ${product.stock === 0 ? 'disabled' : ''}>${product.stock === 0 ? 'Stok tükendi' : 'Sepete Ekle'}</button>
          <button class="btn-wish" id="wishlist-btn" onclick="toggleWishlist()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Favorilere Ekle
          </button>
        </div>

        <div class="trust-bullets">
          <div class="trust-bullet">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            Hızlı teslimat — 1–3 iş günü
          </div>
          <div class="trust-bullet">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
            14 gün koşulsuz iade hakkı
          </div>
          <div class="trust-bullet">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Güvenli ödeme · iyzico · SSL
          </div>
        </div>
      </div>
    </div>

    ${descText ? `<div class="desc-box">
      <div class="box-title" style="margin-bottom:12px">Ürün Açıklaması</div>
      <div class="desc-text${isLong ? '' : ' expanded'}" id="desc-text">${descText}</div>
      ${isLong ? `<button class="btn-desc-more" id="desc-more" onclick="toggleDesc()">Devamını Gör</button>` : ''}
    </div>` : ''}

    <div class="reviews-box" id="reviews-section">
      <div class="loading" style="padding:30px 0">Değerlendirmeler yükleniyor…</div>
    </div>
    <div id="similar-section"></div>`;

  renderGallery();
}

function toggleDesc() {
  const el = document.getElementById('desc-text'), btn = document.getElementById('desc-more');
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'Daha Az Gör' : 'Devamını Gör';
}

function changeProductQty(d) { const i = document.getElementById('product-qty'); if (!i) return; i.value = Math.max(1, Math.min(product.stock, (parseInt(i.value) || 1) + d)); }
function validateQty() { const i = document.getElementById('product-qty'); if (!i) return; i.value = Math.max(1, Math.min(product.stock, parseInt(i.value) || 1)); }
function getQty() { const i = document.getElementById('product-qty'); return i ? (parseInt(i.value) || 1) : 1; }

async function loadReviews() {
  try { renderReviews(await fetch(`/api/reviews/${productId}`).then(r => r.json())); } catch(e) {}
}

function renderReviews(reviews) {
  const sec = document.getElementById('reviews-section'); if (!sec) return;
  const avg = reviews.length ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length) : 0;
  const filled = Math.round(avg);
  sec.innerHTML = `
    <div class="box-title" style="margin-bottom:16px">Değerlendirmeler</div>
    ${reviews.length ? `<div class="reviews-summary">
      <div class="rating-big">${avg.toFixed(1)}</div>
      <div>
        <div class="stars-big">${'★'.repeat(filled)}${'☆'.repeat(5 - filled)}</div>
        <div class="reviews-count">${reviews.length} değerlendirme</div>
      </div>
    </div>
    <div>${reviews.map(r => `
      <div class="review-card">
        <div class="review-header"><span class="reviewer">${r.customer_name}</span><span class="review-date">${new Date(r.created_at).toLocaleDateString('tr-TR')}</span></div>
        <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
        ${r.comment ? `<div class="review-text">${r.comment}</div>` : ''}
      </div>`).join('')}</div>` :
    `<p style="text-align:center;color:var(--text3);padding:20px 0;font-size:13px">Henüz değerlendirme yok.</p>`}
    <div class="add-review">
      <h4>Değerlendirme Yaz</h4>
      <div class="star-selector" id="star-selector">
        ${[1,2,3,4,5].map(n => `<span class="star-opt" onclick="selectStar(${n})">★</span>`).join('')}
      </div>
      <div class="form-group"><label class="form-label">Adınız *</label><input class="form-input" id="r-name" placeholder="Ahmet Y."/></div>
      <div class="form-group"><label class="form-label">Yorumunuz</label><textarea class="form-input" id="r-comment" rows="3" style="resize:vertical" placeholder="Bu ürün hakkında ne düşünüyorsunuz?"></textarea></div>
      <button class="btn-review" onclick="submitReview()">Gönder</button>
    </div>`;
  selectedRating = 0;
}

function selectStar(val) { selectedRating = val; document.querySelectorAll('.star-opt').forEach((el, i) => el.classList.toggle('selected', i < val)); }

async function submitReview() {
  if (!selectedRating) return showToast('Lütfen puan verin');
  const name = document.getElementById('r-name').value.trim();
  if (!name) return showToast('İsim zorunlu');
  const res = await fetch('/api/reviews', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ product_id: productId, customer_name: name, rating: selectedRating, comment: document.getElementById('r-comment').value }) });
  const data = await res.json();
  if (data.id) { showToast('Değerlendirmeniz alındı'); loadReviews(); } else showToast(data.error || 'Hata oluştu');
}

async function loadSimilar() {
  if (!product) return;
  try {
    const all = await fetch(`/api/products?category=${encodeURIComponent(product.category)}`).then(r => r.json());
    const similar = all.filter(p => p.id !== product.id).slice(0, 6);
    if (!similar.length) return;
    document.getElementById('similar-section').innerHTML = `<div class="similar-wrap">
      <div class="section-title">Benzer Ürünler</div>
      <div class="similar-grid">${similar.map(p => {
        const ep = p.discount_price || p.tane_price;
        return `<div class="sim-card" onclick="window.location.href='/product.html?id=${p.id}'">
          <img class="sim-img" src="${p.image_url || ''}" alt="${p.name}" loading="lazy" onerror="this.style.visibility='hidden'"/>
          <div class="sim-body"><div class="sim-name">${p.name}</div><div class="sim-price">${ep > 0 ? ep.toLocaleString('tr-TR') + ' ₺' : '—'}</div></div>
        </div>`;
      }).join('')}</div></div>`;
  } catch(e) {}
}

async function toggleWishlist() {
  if (!product) return;
  const idx = wishlist.indexOf(product.id);
  if (idx === -1) { wishlist.push(product.id); showToast('Favorilere eklendi'); if (currentUser) fetch(`/api/wishlist/${product.id}`, { method: 'POST', credentials: 'include' }); else localStorage.setItem('tane-wishlist', JSON.stringify(wishlist)); }
  else { wishlist.splice(idx, 1); showToast('Favorilerden çıkarıldı'); if (currentUser) fetch(`/api/wishlist/${product.id}`, { method: 'DELETE', credentials: 'include' }); else localStorage.setItem('tane-wishlist', JSON.stringify(wishlist)); }
  updateWishlistBtn();
}

function updateWishlistBtn() {
  if (!product) return;
  const inWl = wishlist.includes(product.id);
  const btn = document.getElementById('wishlist-btn');
  if (btn) { btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="${inWl ? 'var(--red)' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${inWl ? 'Favorilerimde' : 'Favorilere Ekle'}`; btn.classList.toggle('active', inWl); }
}

async function addToCart() {
  if (!product || product.stock === 0) return;
  const qty = getQty();
  const ex = cart.find(x => x.id === product.id);
  if (ex) ex.qty += qty;
  else cart.push({ id: product.id, name: product.name, tane_price: product.tane_price, discount_price: product.discount_price, image_url: product.image_url, qty });
  if (currentUser) await fetch('/api/cart', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ product_id: product.id, quantity: qty }) });
  else localStorage.setItem('tane-cart', JSON.stringify(cart));
  updateCartUI(); showToast('Sepete eklendi'); openCart();
}

function saveCart() { if (!currentUser) localStorage.setItem('tane-cart', JSON.stringify(cart)); }

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const total = cart.reduce((s, i) => s + effectivePrice(i) * i.qty, 0);
  document.getElementById('cart-count').textContent = count;
  const el = document.getElementById('cart-items-el');
  const foot = document.getElementById('cart-foot');
  if (!cart.length) { el.innerHTML = '<div class="cart-empty">Sepetiniz boş</div>'; foot.style.display = 'none'; return; }
  foot.style.display = 'block';
  const FREE = 500, FEE = 49.90, rem = FREE - total, pct = Math.min(100, (total / FREE) * 100);
  const si = document.getElementById('ship-info');
  if (total >= FREE) { si.innerHTML = '<p class="ship-free" style="margin-bottom:12px">Kargo bedava!</p>'; }
  else { si.innerHTML = `<p class="ship-note">${rem.toLocaleString('tr-TR', { maximumFractionDigits: 0 })} ₺ daha ekle, kargo bedava</p><div class="ship-bar"><div class="ship-fill" style="width:${pct}%"></div></div><p class="ship-note" style="margin-bottom:12px">Kargo: ${FEE.toLocaleString('tr-TR')} ₺</p>`; }
  document.getElementById('cart-total').textContent = total.toLocaleString('tr-TR') + ' ₺';
  el.innerHTML = cart.map(item => {
    const imgEl = item.image_url ? `<img class="ci-img" src="${item.image_url}" onerror="this.outerHTML='<div class=ci-ph>—</div>'">` : `<div class="ci-ph">—</div>`;
    return `<div class="cart-item">${imgEl}<div class="ci-body"><div class="ci-name">${item.name}</div><div class="ci-price">${effectivePrice(item).toLocaleString('tr-TR')} ₺</div><div class="ci-qty"><button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button><span class="qty-num">${item.qty}</span><button class="qty-btn" onclick="changeQty(${item.id},1)">+</button></div></div><button class="rm-btn" onclick="removeItem(${item.id})">×</button></div>`;
  }).join('');
}

async function changeQty(id, d) {
  const item = cart.find(x => x.id === id); if (!item) return;
  item.qty += d; if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
  if (currentUser) { if (item.qty <= 0) fetch(`/api/cart/${id}`, { method: 'DELETE', credentials: 'include' }); else fetch(`/api/cart/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ quantity: item.qty }) }); } else saveCart();
  updateCartUI();
}
async function removeItem(id) { cart = cart.filter(x => x.id !== id); if (currentUser) fetch(`/api/cart/${id}`, { method: 'DELETE', credentials: 'include' }); else saveCart(); updateCartUI(); }
function toggleCart() { document.getElementById('cart-side').classList.toggle('open'); document.getElementById('cart-overlay').classList.toggle('open'); }
function openCart() { document.getElementById('cart-side').classList.add('open'); document.getElementById('cart-overlay').classList.add('open'); }
function closeModal() { document.getElementById('order-modal').classList.remove('open'); }

function openOrderModal() {
  if (!cart.length) return showToast('Sepetiniz boş');
  appliedCoupon = null;
  document.getElementById('coupon-code').value = '';
  document.getElementById('coupon-result').innerHTML = '';
  if (currentUser) { document.getElementById('o-name').value = currentUser.name || ''; document.getElementById('o-phone').value = currentUser.phone || ''; document.getElementById('o-email').value = currentUser.email || ''; document.getElementById('o-address').value = currentUser.address || ''; document.getElementById('o-city').value = currentUser.city || ''; }
  updateOrderSummary();
  document.getElementById('order-form-screen').classList.remove('hidden');
  document.getElementById('order-success-screen').classList.add('hidden');
  document.getElementById('order-modal').classList.add('open');
  document.getElementById('cart-side').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
}

function updateOrderSummary() {
  const sub = cart.reduce((s, i) => s + effectivePrice(i) * i.qty, 0);
  const disc = appliedCoupon ? appliedCoupon.discount : 0;
  document.getElementById('order-summary').innerHTML = `<div class="order-sum-title">Sipariş Özeti</div>${cart.map(i => `<div class="order-row"><span>${i.name} ×${i.qty}</span><span>${(effectivePrice(i) * i.qty).toLocaleString('tr-TR')} ₺</span></div>`).join('')}${disc > 0 ? `<div class="order-row" style="color:var(--green)"><span>İndirim (${appliedCoupon.code})</span><span>−${disc.toLocaleString('tr-TR')} ₺</span></div>` : ''}<div class="order-total"><span>Toplam</span><span>${(sub - disc).toLocaleString('tr-TR')} ₺</span></div>`;
}

async function applyCoupon() {
  const code = document.getElementById('coupon-code').value.trim(); if (!code) return;
  const sub = cart.reduce((s, i) => s + effectivePrice(i) * i.qty, 0);
  const res = await fetch('/api/coupons/apply', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, total: sub }) });
  const data = await res.json(); const el = document.getElementById('coupon-result');
  if (data.valid) { appliedCoupon = data; el.innerHTML = `<p class="coupon-ok">${data.message}</p>`; updateOrderSummary(); } else { el.innerHTML = `<p class="coupon-err">${data.error}</p>`; }
}

async function submitOrder() {
  const name = document.getElementById('o-name').value.trim(), phone = document.getElementById('o-phone').value.trim(), address = document.getElementById('o-address').value.trim(), city = document.getElementById('o-city').value.trim();
  if (!name || !phone || !address || !city) return showToast('Zorunlu alanları doldurun');
  const btn = document.getElementById('btn-order'); btn.textContent = 'Gönderiliyor…'; btn.disabled = true;
  const res = await fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ customer_name: name, customer_phone: phone, customer_email: document.getElementById('o-email').value, customer_address: address, customer_city: city, note: document.getElementById('o-note').value, coupon_code: appliedCoupon ? appliedCoupon.code : null, discount_amount: appliedCoupon ? appliedCoupon.discount : 0, items: cart.map(i => ({ product_id: i.id, product_name: i.name, price: effectivePrice(i), quantity: i.qty })) }) });
  btn.textContent = 'Siparişi Onayla'; btn.disabled = false;
  const data = await res.json();
  if (data.id) { cart = []; if (currentUser) fetch('/api/cart', { method: 'DELETE', credentials: 'include' }); else saveCart(); updateCartUI(); document.getElementById('success-order-id').textContent = '#' + data.id; document.getElementById('track-link').href = '/track?id=' + data.id; document.getElementById('order-form-screen').classList.add('hidden'); document.getElementById('order-success-screen').classList.remove('hidden'); }
  else { showToast(data.error || 'Bir hata oluştu'); }
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2200); }

initAuth().then(() => loadProduct());
</script>
