<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tane Store — Urun Detayi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}

nav{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:100;height:56px;display:flex;align-items:center;padding:0 24px;gap:16px}
.logo{font-weight:700;font-size:18px;color:#111;text-decoration:none;letter-spacing:-0.5px}
.logo span{color:#e85d00}
.nav-spacer{flex:1}
.nav-link{font-size:13px;color:#555;text-decoration:none;white-space:nowrap}
.nav-link:hover{color:#111}
.btn-cart{background:#111;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-cart:hover{background:#333}
.cart-count{background:#e85d00;color:#fff;font-size:11px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}

.breadcrumb{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:8px;font-size:13px;color:#aaa}
.breadcrumb a{color:#aaa;text-decoration:none}.breadcrumb a:hover{color:#111}
.bc-sep{color:#ccc}

.main{max-width:1100px;margin:0 auto;padding:0 24px 60px}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;margin-bottom:32px}

/* GALLERY */
.gallery-wrap{position:sticky;top:72px}
.gallery-main{position:relative;background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;aspect-ratio:1}
.gallery-main img{width:100%;height:100%;object-fit:contain;display:block;padding:16px;transition:opacity .2s}
.gallery-ph{width:100%;height:100%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:13px}
.gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:1px solid #e5e5e5;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#555;z-index:2;transition:all .15s}
.gallery-arrow:hover{background:#fff;border-color:#aaa;color:#111}
.gallery-arrow.prev{left:10px}
.gallery-arrow.next{right:10px}
.gallery-arrow.hidden{display:none}
.gallery-dots{display:flex;justify-content:center;gap:5px;margin-top:10px}
.gallery-dot{width:6px;height:6px;border-radius:50%;background:#ddd;cursor:pointer;transition:all .2s}
.gallery-dot.active{background:#e85d00;width:16px;border-radius:3px}
.gallery-thumbs{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.gallery-thumbs::-webkit-scrollbar{display:none}
.gallery-thumb{flex-shrink:0;width:60px;height:60px;border-radius:8px;object-fit:contain;border:2px solid transparent;cursor:pointer;background:#fff;padding:4px;transition:all .15s}
.gallery-thumb.active{border-color:#e85d00}
.gallery-thumb:hover:not(.active){border-color:#ccc}

/* PRODUCT INFO */
.product-category{font-size:12px;color:#888;margin-bottom:6px}
.product-name{font-size:20px;font-weight:600;line-height:1.4;margin-bottom:10px}
.rating-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.stars{color:#e85d00;font-size:14px;letter-spacing:1px}
.review-count{font-size:12px;color:#888}
.sku{font-size:12px;color:#bbb;margin-bottom:16px}

/* PRICE */
.price-box{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:18px;margin-bottom:12px}
.price-label{font-size:11px;color:#aaa;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.price-original{font-size:13px;color:#aaa;text-decoration:line-through;margin-bottom:2px}
.price-main{font-size:28px;font-weight:700;color:#111}
.price-main.sale{color:#e85d00}
.discount-tag{display:inline-block;background:#e85d00;color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.stock-tag{display:inline-block;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;margin-top:10px}
.in-stock{background:#f0fdf4;color:#16a34a}
.low-stock{background:#fff8f0;color:#e85d00}
.out-stock{background:#fef2f2;color:#ef4444}

/* COMPARE */
.compare-box{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px;margin-bottom:12px}
.box-title{font-size:13px;font-weight:600;margin-bottom:12px}
.cmp-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;border:1px solid #f0f0f0;margin-bottom:6px}
.cmp-row:last-child{margin-bottom:0}
.cmp-row.best{background:#f0fdf4;border-color:#bbf7d0}
.cmp-name{font-size:13px;font-weight:500}
.cmp-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;background:#f0fdf4;color:#16a34a;margin-left:6px}
.cmp-price{font-size:13px;font-weight:600}
.cmp-diff{font-size:11px;color:#ef4444;margin-left:6px}

/* ACTIONS */
.actions{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-label{font-size:13px;color:#555}
.qty-ctrl{display:flex;align-items:center;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
.qty-ctrl button{width:36px;height:38px;border:none;background:#f5f5f5;cursor:pointer;font-size:16px;font-weight:600;color:#555}
.qty-ctrl button:hover{background:#e5e5e5}
.qty-ctrl input{width:48px;height:38px;border:none;border-left:1px solid #e5e5e5;border-right:1px solid #e5e5e5;text-align:center;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;outline:none}
.btn-add{background:#111;color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;cursor:pointer;width:100%}
.btn-add:hover:not(:disabled){background:#e85d00}
.btn-add:disabled{background:#ccc;cursor:not-allowed}
.btn-wish{background:#fff;color:#555;border:1px solid #e5e5e5;padding:11px;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;width:100%}
.btn-wish:hover{border-color:#aaa;color:#111}
.btn-wish.active{background:#fef2f2;border-color:#fca5a5;color:#ef4444}

/* DESCRIPTION */
.desc-box{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:20px;margin-bottom:16px}
.desc-text{font-size:14px;color:#555;line-height:1.8;max-height:200px;overflow:hidden;transition:max-height .3s}
.desc-text.expanded{max-height:2000px}
.btn-desc-more{background:none;border:none;color:#e85d00;font-size:13px;font-weight:500;cursor:pointer;padding:8px 0;display:block}

/* REVIEWS */
.reviews-box{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:20px;margin-bottom:16px}
.reviews-summary{display:flex;align-items:center;gap:16px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #f0f0f0}
.rating-big{font-size:40px;font-weight:700;line-height:1}
.stars-big{color:#e85d00;font-size:18px;letter-spacing:2px}
.reviews-count{font-size:13px;color:#888;margin-top:4px}
.review-card{padding:14px;background:#f9f9f9;border-radius:8px;margin-bottom:8px}
.review-header{display:flex;justify-content:space-between;margin-bottom:4px}
.reviewer{font-size:13px;font-weight:500}
.review-date{font-size:12px;color:#aaa}
.review-stars{color:#e85d00;font-size:13px;margin-bottom:5px}
.review-text{font-size:13px;color:#555;line-height:1.6}
.add-review{border-top:1px solid #f0f0f0;padding-top:18px;margin-top:4px}
.add-review h4{font-size:14px;font-weight:600;margin-bottom:14px}
.star-selector{display:flex;gap:6px;margin-bottom:12px}
.star-opt{font-size:26px;cursor:pointer;color:#ddd;transition:color .1s;line-height:1;user-select:none}
.star-opt.selected,.star-opt:hover{color:#e85d00}
.form-group{margin-bottom:10px}
.form-label{font-size:12px;color:#555;font-weight:500;margin-bottom:4px;display:block}
.form-input{width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border .15s}
.form-input:focus{border-color:#111}
.btn-review{background:#111;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:500;font-size:13px;cursor:pointer}
.btn-review:hover{background:#e85d00}

/* SIMILAR */
.similar-wrap{margin-top:24px}
.section-title{font-size:16px;font-weight:600;margin-bottom:14px}
.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.sim-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.sim-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.sim-img{width:100%;height:120px;object-fit:contain;background:#f9f9f9;padding:8px}
.sim-body{padding:10px}
.sim-name{font-size:12px;color:#555;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sim-price{font-weight:700;font-size:13px;color:#e85d00}

/* CART SIDEBAR */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.cart-side{position:fixed;top:0;right:0;bottom:0;width:360px;background:#fff;z-index:201;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;border-left:1px solid #e5e5e5}
.cart-side.open{transform:translateX(0)}
.cart-head{padding:18px 20px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between}
.cart-head h3{font-size:16px;font-weight:600}
.close-btn{background:none;border:none;cursor:pointer;font-size:20px;color:#888;line-height:1}
.cart-items{flex:1;overflow-y:auto;padding:16px 20px}
.cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5}
.ci-img{width:52px;height:52px;object-fit:contain;border-radius:8px;background:#f5f5f5;flex-shrink:0;padding:4px}
.ci-ph{width:52px;height:52px;border-radius:8px;background:#f5f5f5;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#bbb}
.ci-name{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.3}
.ci-price{font-size:13px;font-weight:600;color:#e85d00;margin-bottom:6px}
.ci-qty{display:flex;align-items:center;gap:8px}
.qty-btn{width:26px;height:26px;border:1px solid #e5e5e5;background:#fff;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;color:#555}
.qty-btn:hover{background:#111;color:#fff;border-color:#111}
.qty-num{font-size:13px;font-weight:600;min-width:18px;text-align:center}
.rm-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;margin-left:auto;align-self:flex-start;margin-top:2px}
.rm-btn:hover{color:#ef4444}
.cart-foot{padding:16px 20px;border-top:1px solid #e5e5e5}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total-label{font-size:14px;color:#555}
.cart-total-price{font-size:20px;font-weight:700}
.btn-checkout{width:100%;background:#e85d00;color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:15px;cursor:pointer}
.btn-checkout:hover{background:#c94d00}

/* ORDER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:14px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-size:18px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:13px;color:#888;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.order-summary{background:#f9f9f9;border-radius:8px;padding:14px;margin-bottom:18px;border:1px solid #f0f0f0}
.order-summary-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.order-item-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:#555}
.order-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:600;border-top:1px solid #e5e5e5;padding-top:10px;margin-top:6px}
.btn-order{width:100%;background:#e85d00;color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:15px;cursor:pointer;margin-top:8px}
.btn-order:hover{background:#c94d00}
.btn-order-back{width:100%;background:#f5f5f5;color:#555;border:none;padding:11px;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;margin-top:6px}
.success-screen{text-align:center;padding:20px 0}
.success-title{font-size:20px;font-weight:600;margin-bottom:8px}
.success-sub{font-size:14px;color:#888;line-height:1.6}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 22px;border-radius:10px;font-size:14px;font-weight:500;z-index:999;display:none}
.loading{text-align:center;padding:60px 0;color:#aaa;font-size:14px}
.hidden{display:none}

@media(max-width:700px){
  .product-grid{grid-template-columns:1fr;gap:20px}
  .gallery-wrap{position:static}
  .form-row{grid-template-columns:1fr}
  .cart-side{width:100%}
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">TANE <span>STORE</span></a>
  <div class="nav-spacer"></div>
  <a href="/track" class="nav-link">Siparisim</a>
  <div id="auth-nav" style="display:flex;align-items:center"><a href="/login" class="nav-link">Giris Yap</a></div>
  <button class="btn-cart" onclick="toggleCart()">Sepet <span class="cart-count" id="cart-count">0</span></button>
</nav>

<div class="breadcrumb">
  <a href="/">Ana Sayfa</a>
  <span class="bc-sep">›</span>
  <span id="breadcrumb-name" style="color:#555">Urun</span>
</div>

<div class="main" id="main-content">
  <div class="loading">Yukleniyor...</div>
</div>

<!-- CART -->
<div class="overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-side" id="cart-side">
  <div class="cart-head">
    <h3>Sepetim</h3>
    <button class="close-btn" onclick="toggleCart()">&#x2715;</button>
  </div>
  <div class="cart-items" id="cart-items-el"></div>
  <div class="cart-foot" id="cart-foot" style="display:none">
    <div class="cart-total-row">
      <span class="cart-total-label">Toplam</span>
      <span class="cart-total-price" id="cart-total">0 &#8378;</span>
    </div>
    <button class="btn-checkout" onclick="openOrderModal()">Siparis Ver</button>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <div id="order-form-screen">
      <h2>Siparis Ver</h2>
      <p class="modal-sub">Bilgilerini girerek siparisi tamamla.</p>
      <div class="order-summary" id="order-summary"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ad Soyad *</label><input class="form-input" id="o-name" placeholder="Ahmet Yilmaz"/></div>
        <div class="form-group"><label class="form-label">Telefon *</label><input class="form-input" id="o-phone" placeholder="05xx xxx xx xx"/></div>
      </div>
      <div class="form-group"><label class="form-label">E-posta</label><input class="form-input" id="o-email" type="email" placeholder="ahmet@email.com"/></div>
      <div class="form-group"><label class="form-label">Acik Adres *</label><input class="form-input" id="o-address" placeholder="Mahalle, cadde, sokak, no, daire..."/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sehir *</label><input class="form-input" id="o-city" placeholder="Istanbul"/></div>
        <div class="form-group"><label class="form-label">Not</label><input class="form-input" id="o-note" placeholder="Kargo notu..."/></div>
      </div>
      <button class="btn-order" onclick="submitOrder()">Siparisi Tamamla</button>
      <button class="btn-order-back" onclick="closeOrderModal()">Geri Don</button>
    </div>
    <div id="order-success-screen" class="success-screen hidden">
      <div style="font-size:48px;margin-bottom:16px">&#10003;</div>
      <div class="success-title">Siparisiz Alindi!</div>
      <p class="success-sub">En kisa surede sizinle iletisime gecegiz.</p>
      <button class="btn-order" style="margin-top:24px" onclick="window.location.href='/'">Ana Sayfaya Don</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
let product = null;
let cart = [];
let wishlist = [];
let currentUser = null;
let selectedRating = 0;
let galleryImages = [];
let currentImg = 0;

async function initAuth() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.ok) {
      currentUser = await res.json();
      document.getElementById('auth-nav').innerHTML =
        `<a href="/hesabim" class="nav-link">${currentUser.name.split(' ')[0]}</a>`;
      const cr = await fetch('/api/cart', { credentials: 'include' });
      if (cr.ok) {
        const items = await cr.json();
        cart = items.map(i => ({ id: i.product_id, name: i.name, tane_price: i.tane_price, discount_price: i.discount_price, image_url: i.image_url, qty: i.quantity }));
      }
      const wr = await fetch('/api/wishlist', { credentials: 'include' });
      if (wr.ok) { const items = await wr.json(); wishlist = items.map(i => i.product_id); }
    } else {
      cart = JSON.parse(localStorage.getItem('tane-cart') || '[]');
      wishlist = JSON.parse(localStorage.getItem('tane-wishlist') || '[]');
    }
  } catch(e) {
    cart = JSON.parse(localStorage.getItem('tane-cart') || '[]');
    wishlist = JSON.parse(localStorage.getItem('tane-wishlist') || '[]');
  }
  updateCartUI();
}

function effectivePrice(p) { return p.discount_price || p.tane_price; }

async function loadProduct() {
  if (!productId) { window.location.href = '/'; return; }
  try {
    const res = await fetch(`/api/products/${productId}`);
    product = await res.json();
    if (product.error) { window.location.href = '/'; return; }
    document.title = `${product.name} — Tane Store`;
    document.getElementById('breadcrumb-name').textContent = product.name;
    renderProduct();
    loadReviews();
    loadSimilar();
    updateWishlistBtn();
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="loading">Urun yuklenemedi.</div>';
  }
}

function renderGallery() {
  try { galleryImages = product.images ? JSON.parse(product.images) : []; } catch(e) { galleryImages = []; }
  if (!galleryImages.length && product.image_url) galleryImages = [product.image_url];
  currentImg = 0;

  const wrap = document.getElementById('gallery-wrap');
  if (!wrap) return;

  const mainSrc = galleryImages.length ? galleryImages[0] : null;
  const mainHTML = mainSrc
    ? `<img id="gallery-main-img" src="${mainSrc}" alt="${product.name}" onerror="this.parentElement.innerHTML='<div class=gallery-ph>Gorsel yok</div>'">`
    : `<div class="gallery-ph">Gorsel yok</div>`;

  const thumbsHTML = galleryImages.length > 1
    ? `<div class="gallery-thumbs">${galleryImages.map((src, i) =>
        `<img class="gallery-thumb ${i===0?'active':''}" src="${src}" data-idx="${i}" onclick="goToImg(${i})" onerror="this.style.display='none'">`
      ).join('')}</div>` : '';

  const dotsHTML = galleryImages.length > 1
    ? `<div class="gallery-dots">${galleryImages.map((_, i) =>
        `<div class="gallery-dot ${i===0?'active':''}" onclick="goToImg(${i})"></div>`
      ).join('')}</div>` : '';

  wrap.innerHTML = `
    <div class="gallery-main">
      ${mainHTML}
      <button class="gallery-arrow prev hidden" id="gallery-prev" onclick="prevImg()">&#8249;</button>
      <button class="gallery-arrow next ${galleryImages.length < 2 ? 'hidden' : ''}" id="gallery-next" onclick="nextImg()">&#8250;</button>
    </div>
    ${dotsHTML}${thumbsHTML}`;

  const gm = wrap.querySelector('.gallery-main');
  if (gm) {
    let startX = 0;
    gm.addEventListener('touchstart', e => startX = e.touches[0].clientX, { passive: true });
    gm.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (dx < -50) nextImg(); else if (dx > 50) prevImg();
    }, { passive: true });
  }
}

function goToImg(idx) {
  if (!galleryImages.length) return;
  currentImg = Math.max(0, Math.min(galleryImages.length - 1, idx));
  const mainImg = document.getElementById('gallery-main-img');
  if (mainImg) { mainImg.style.opacity='0'; setTimeout(() => { mainImg.src=galleryImages[currentImg]; mainImg.style.opacity='1'; }, 150); }
  document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === currentImg));
  document.querySelectorAll('.gallery-dot').forEach((d, i) => d.classList.toggle('active', i === currentImg));
  document.getElementById('gallery-prev').classList.toggle('hidden', currentImg === 0);
  document.getElementById('gallery-next').classList.toggle('hidden', currentImg === galleryImages.length - 1);
}
function prevImg() { goToImg(currentImg - 1); }
function nextImg() { goToImg(currentImg + 1); }

function renderProduct() {
  const ep = effectivePrice(product);
  const hasSale = product.discount_price && product.discount_price < product.tane_price;
  const discPct = hasSale ? Math.round((1 - product.discount_price / product.tane_price) * 100) : 0;

  const priceHTML = hasSale
    ? `<div class="price-original">${product.tane_price.toLocaleString('tr-TR')} &#8378;</div>
       <div><span class="price-main sale">${product.discount_price.toLocaleString('tr-TR')} &#8378;</span><span class="discount-tag">-${discPct}%</span></div>`
    : `<div class="price-main">${product.tane_price > 0 ? product.tane_price.toLocaleString('tr-TR') + ' &#8378;' : 'Fiyat guncelleniyor...'}</div>`;

  const stockHTML = product.stock === 0
    ? `<span class="stock-tag out-stock">Stok Tukendi</span>`
    : product.stock <= 10
    ? `<span class="stock-tag low-stock">Son ${product.stock} urun</span>`
    : `<span class="stock-tag in-stock">Stokta var</span>`;

  const prices = product.prices || [];
  let compareHTML = '';
  if (prices.length > 0) {
    const sorted = [...prices].sort((a, b) => a.price - b.price).slice(0, 3);
    const rows = sorted.map(p => {
      const diff = p.price - ep;
      return `<div class="cmp-row">
        <span class="cmp-name">${p.platform}</span>
        <span class="cmp-price">${p.price.toLocaleString('tr-TR')} &#8378;${diff > 0 ? `<span class="cmp-diff">+${diff.toLocaleString('tr-TR')} &#8378;</span>` : ''}</span>
      </div>`;
    }).join('');
    const taneRow = ep > 0 ? `<div class="cmp-row best">
      <span class="cmp-name">Tane Store<span class="cmp-badge">EN UCUZ</span></span>
      <span class="cmp-price" style="color:#16a34a">${ep.toLocaleString('tr-TR')} &#8378;</span>
    </div>` : '';
    compareHTML = `<div class="compare-box"><div class="box-title">Fiyat Karsilastirmasi</div>${taneRow}${rows}</div>`;
  }

  const starsHTML = product.rating
    ? `<div class="rating-row">
        <span class="stars">${'★'.repeat(Math.round(product.rating))}${'☆'.repeat(5 - Math.round(product.rating))}</span>
        <span class="review-count">${product.rating}/5 · ${product.review_count || 0} yorum</span>
       </div>` : '';

  const descText = product.description || '';
  const isLong = descText.length > 400;

  document.getElementById('main-content').innerHTML = `
    <div class="product-grid">
      <div class="gallery-wrap" id="gallery-wrap"></div>
      <div>
        <div class="product-category">${product.category || 'Genel'}</div>
        <div class="product-name">${product.name}</div>
        ${starsHTML}
        ${product.sku ? `<div class="sku">SKU: ${product.sku}</div>` : ''}

        <div class="price-box">
          <div class="price-label">Tane Store Fiyati</div>
          ${priceHTML}
          ${stockHTML}
        </div>

        ${compareHTML}

        <div class="actions">
          ${product.stock > 0 ? `<div class="qty-row">
            <span class="qty-label">Adet</span>
            <div class="qty-ctrl">
              <button onclick="changeProductQty(-1)">&#8722;</button>
              <input type="number" id="product-qty" value="1" min="1" max="${product.stock}" oninput="validateQty()"/>
              <button onclick="changeProductQty(1)">+</button>
            </div>
          </div>` : ''}
          <button class="btn-add" onclick="addToCart()" ${product.stock === 0 ? 'disabled' : ''}>${product.stock === 0 ? 'Stok Tukendi' : 'Sepete Ekle'}</button>
          <button class="btn-wish" id="wishlist-btn" onclick="toggleWishlist()">Favorilere Ekle</button>
        </div>
      </div>
    </div>

    ${descText ? `<div class="desc-box">
      <div class="box-title" style="margin-bottom:12px">Urun Aciklamasi</div>
      <div class="desc-text ${isLong ? '' : 'expanded'}" id="desc-text">${descText}</div>
      ${isLong ? `<button class="btn-desc-more" id="desc-more" onclick="toggleDesc()">Devamini Goster</button>` : ''}
    </div>` : ''}

    <div class="reviews-box" id="reviews-section">
      <div class="loading">Yorumlar yukleniyor...</div>
    </div>

    <div id="similar-section"></div>`;

  renderGallery();
}

function toggleDesc() {
  const el = document.getElementById('desc-text');
  const btn = document.getElementById('desc-more');
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'Daha Az Goster' : 'Devamini Goster';
}

function changeProductQty(d) {
  const input = document.getElementById('product-qty'); if (!input) return;
  input.value = Math.max(1, Math.min(product.stock, (parseInt(input.value) || 1) + d));
}
function validateQty() {
  const input = document.getElementById('product-qty'); if (!input) return;
  input.value = Math.max(1, Math.min(product.stock, parseInt(input.value) || 1));
}
function getSelectedQty() {
  const input = document.getElementById('product-qty'); return input ? (parseInt(input.value) || 1) : 1;
}

async function loadReviews() {
  try { renderReviews(await fetch(`/api/reviews/${productId}`).then(r => r.json())); } catch(e) {}
}

function renderReviews(reviews) {
  const sec = document.getElementById('reviews-section'); if (!sec) return;
  const avg = reviews.length ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length) : 0;
  const filled = Math.round(avg);

  sec.innerHTML = `
    <div class="box-title" style="margin-bottom:16px">Musteri Yorumlari</div>
    ${reviews.length ? `<div class="reviews-summary">
      <div class="rating-big">${avg.toFixed(1)}</div>
      <div>
        <div class="stars-big">${'★'.repeat(filled)}${'☆'.repeat(5 - filled)}</div>
        <div class="reviews-count">${reviews.length} degerlendirme</div>
      </div>
    </div>
    <div>${reviews.map(r => `
      <div class="review-card">
        <div class="review-header">
          <span class="reviewer">${r.customer_name}</span>
          <span class="review-date">${new Date(r.created_at).toLocaleDateString('tr-TR')}</span>
        </div>
        <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
        ${r.comment ? `<div class="review-text">${r.comment}</div>` : ''}
      </div>`).join('')}</div>` :
    `<div style="text-align:center;color:#aaa;padding:20px 0;font-size:13px">Henuz yorum yok.</div>`}
    <div class="add-review">
      <h4>Yorum Yaz</h4>
      <div class="star-selector" id="star-selector">
        ${[1,2,3,4,5].map(n => `<span class="star-opt" onclick="selectStar(${n})">&#9733;</span>`).join('')}
      </div>
      <div class="form-group"><label class="form-label">Adiniz *</label><input class="form-input" id="r-name" placeholder="Ahmet Y."/></div>
      <div class="form-group"><label class="form-label">Yorumunuz</label><textarea class="form-input" id="r-comment" rows="3" style="resize:vertical" placeholder="Bu urun hakkinda ne dusunuyorsunuz?"></textarea></div>
      <button class="btn-review" onclick="submitReview()">Gonder</button>
    </div>`;
  selectedRating = 0;
}

function selectStar(val) {
  selectedRating = val;
  document.querySelectorAll('.star-opt').forEach((el, i) => el.classList.toggle('selected', i < val));
}

async function submitReview() {
  if (!selectedRating) return showToast('Lutfen puan ver');
  const name = document.getElementById('r-name').value.trim();
  if (!name) return showToast('Isim zorunlu');
  const res = await fetch('/api/reviews', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ product_id: productId, customer_name: name, rating: selectedRating, comment: document.getElementById('r-comment').value })
  });
  const data = await res.json();
  if (data.id) { showToast('Yorumunuz alindi'); loadReviews(); }
  else showToast(data.error || 'Hata olustu');
}

async function loadSimilar() {
  if (!product) return;
  try {
    const all = await fetch(`/api/products?category=${encodeURIComponent(product.category)}`).then(r => r.json());
    const similar = all.filter(p => p.id !== product.id).slice(0, 6);
    if (!similar.length) return;
    document.getElementById('similar-section').innerHTML = `
      <div class="similar-wrap">
        <div class="section-title">Benzer Urunler</div>
        <div class="similar-grid">
          ${similar.map(p => {
            const ep = p.discount_price || p.tane_price;
            return `<div class="sim-card" onclick="window.location.href='/product.html?id=${p.id}'">
              <img class="sim-img" src="${p.image_url || ''}" alt="${p.name}" onerror="this.style.visibility='hidden'"/>
              <div class="sim-body">
                <div class="sim-name">${p.name}</div>
                <div class="sim-price">${ep > 0 ? ep.toLocaleString('tr-TR') + ' &#8378;' : '—'}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  } catch(e) {}
}

async function toggleWishlist() {
  if (!product) return;
  const idx = wishlist.indexOf(product.id);
  if (idx === -1) {
    wishlist.push(product.id); showToast('Favorilere eklendi');
    if (currentUser) fetch(`/api/wishlist/${product.id}`, { method: 'POST', credentials: 'include' });
    else localStorage.setItem('tane-wishlist', JSON.stringify(wishlist));
  } else {
    wishlist.splice(idx, 1); showToast('Favorilerden cikarildi');
    if (currentUser) fetch(`/api/wishlist/${product.id}`, { method: 'DELETE', credentials: 'include' });
    else localStorage.setItem('tane-wishlist', JSON.stringify(wishlist));
  }
  updateWishlistBtn();
}

function updateWishlistBtn() {
  if (!product) return;
  const inWl = wishlist.includes(product.id);
  const btn = document.getElementById('wishlist-btn');
  if (btn) { btn.textContent = inWl ? 'Favorilerimde' : 'Favorilere Ekle'; btn.classList.toggle('active', inWl); }
}

async function addToCart() {
  if (!product || product.stock === 0) return;
  const qty = getSelectedQty();
  const ex = cart.find(x => x.id === product.id);
  if (ex) ex.qty += qty;
  else cart.push({ id: product.id, name: product.name, tane_price: product.tane_price, discount_price: product.discount_price, image_url: product.image_url, qty });
  if (currentUser) await fetch('/api/cart', { method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify({ product_id: product.id, quantity: qty }) });
  else localStorage.setItem('tane-cart', JSON.stringify(cart));
  updateCartUI(); showToast('Sepete eklendi'); openCart();
}

function saveCart() { if (!currentUser) localStorage.setItem('tane-cart', JSON.stringify(cart)); }

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const total = cart.reduce((s, i) => s + effectivePrice(i) * i.qty, 0);
  document.getElementById('cart-count').textContent = count;
  const el = document.getElementById('cart-items-el');
  const foot = document.getElementById('cart-foot');
  if (!cart.length) {
    el.innerHTML = `<div style="text-align:center;padding:60px 0;color:#aaa;font-size:13px">Sepetiniz bos</div>`;
    foot.style.display = 'none'; return;
  }
  foot.style.display = 'block';
  document.getElementById('cart-total').textContent = total.toLocaleString('tr-TR') + ' ₺';
  el.innerHTML = cart.map(item => {
    const imgEl = item.image_url
      ? `<img class="ci-img" src="${item.image_url}" onerror="this.outerHTML='<div class=ci-ph>-</div>'">`
      : `<div class="ci-ph">-</div>`;
    return `<div class="cart-item">${imgEl}
      <div style="flex:1">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">${effectivePrice(item).toLocaleString('tr-TR')} &#8378;</div>
        <div class="ci-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">&#8722;</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          <button class="rm-btn" onclick="removeItem(${item.id})">&#10005;</button>
        </div>
      </div></div>`;
  }).join('');
}

function changeQty(id, d) {
  const item = cart.find(x => x.id === id); if (!item) return;
  item.qty += d; if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
  if (currentUser) {
    if (item.qty <= 0) fetch(`/api/cart/${id}`, { method: 'DELETE', credentials: 'include' });
    else fetch(`/api/cart/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify({ quantity: item.qty }) });
  } else saveCart();
  updateCartUI();
}
function removeItem(id) {
  cart = cart.filter(x => x.id !== id);
  if (currentUser) fetch(`/api/cart/${id}`, { method: 'DELETE', credentials: 'include' });
  else saveCart();
  updateCartUI();
}
function toggleCart() { document.getElementById('cart-side').classList.toggle('open'); document.getElementById('cart-overlay').classList.toggle('open'); }
function openCart() { document.getElementById('cart-side').classList.add('open'); document.getElementById('cart-overlay').classList.add('open'); }

function openOrderModal() {
  if (!cart.length) return showToast('Sepetiniz bos!');
  if (currentUser) {
    document.getElementById('o-name').value = currentUser.name || '';
    document.getElementById('o-phone').value = currentUser.phone || '';
    document.getElementById('o-email').value = currentUser.email || '';
    document.getElementById('o-address').value = currentUser.address || '';
    document.getElementById('o-city').value = currentUser.city || '';
  }
  const total = cart.reduce((s, i) => s + effectivePrice(i) * i.qty, 0);
  document.getElementById('order-summary').innerHTML = `
    <div class="order-summary-title">Siparis Ozeti</div>
    ${cart.map(i => `<div class="order-item-row"><span>${i.name} ×${i.qty}</span><span>${(effectivePrice(i)*i.qty).toLocaleString('tr-TR')} &#8378;</span></div>`).join('')}
    <div class="order-total-row"><span>Toplam</span><span>${total.toLocaleString('tr-TR')} &#8378;</span></div>`;
  document.getElementById('order-form-screen').classList.remove('hidden');
  document.getElementById('order-success-screen').classList.add('hidden');
  document.getElementById('order-modal').classList.add('open');
  document.getElementById('cart-side').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
}
function closeOrderModal() { document.getElementById('order-modal').classList.remove('open'); }

async function submitOrder() {
  const name = document.getElementById('o-name').value.trim();
  const phone = document.getElementById('o-phone').value.trim();
  const address = document.getElementById('o-address').value.trim();
  const city = document.getElementById('o-city').value.trim();
  if (!name||!phone||!address||!city) return showToast('Zorunlu alanlari doldur!');
  const res = await fetch('/api/orders', {
    method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
    body: JSON.stringify({ customer_name: name, customer_phone: phone, customer_email: document.getElementById('o-email').value, customer_address: address, customer_city: city, note: document.getElementById('o-note').value, items: cart.map(i => ({ product_id: i.id, product_name: i.name, price: effectivePrice(i), quantity: i.qty })) })
  });
  const data = await res.json();
  if (data.id) {
    cart = [];
    if (currentUser) fetch('/api/cart', { method: 'DELETE', credentials: 'include' });
    else saveCart();
    updateCartUI();
    document.getElementById('order-form-screen').classList.add('hidden');
    document.getElementById('order-success-screen').classList.remove('hidden');
  } else showToast(data.error || 'Hata olustu');
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }

initAuth().then(() => loadProduct());
</script>
</body>
